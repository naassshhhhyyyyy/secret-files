<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔐 Secret Social</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Quill Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <!-- QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================= -->
<!-- AUTH MODAL                                     -->
<!-- ============================================= -->
<div id="authModal">
  <div class="auth-card">
    <h2 id="authTitle"><i class="fas fa-user"></i> Login</h2>
    <input type="text" id="authUsername" placeholder="Username">
    <input type="email" id="authEmail" placeholder="Email (for signup)">
    <input type="password" id="authPassword" placeholder="Password">
    <button class="btn btn-primary" id="authSubmitBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div class="switch-link" id="authSwitch">Don't have an account? Sign up</div>
    <div id="authError" class="auth-error"></div>
  </div>
</div>

<!-- ============================================= -->
<!-- QR MODAL                                       -->
<!-- ============================================= -->
<div id="qrModal">
  <div class="qr-card">
    <button class="close-btn" id="closeQRModal"><i class="fas fa-times"></i></button>
    <h3><i class="fas fa-qrcode"></i> QR Code</h3>
    <div id="qrContainer"></div>
    <p style="font-size:0.8rem;opacity:0.6;margin-top:0.5rem;" id="qrLabel">Scan to view this</p>
    <button class="btn btn-outline" id="downloadQRBtn"><i class="fas fa-download"></i> Download</button>
  </div>
</div>

<!-- ============================================= -->
<!-- SETTINGS MODAL                                 -->
<!-- ============================================= -->
<div id="settingsModal">
  <div class="settings-card">
    <button class="close-btn" id="closeSettingsModal"><i class="fas fa-times"></i></button>
    <h3><i class="fas fa-palette"></i> Choose Theme</h3>
    <div class="settings-theme-grid" id="settingsThemeGrid">
      <div class="settings-theme-option active" data-theme="dark"><div class="theme-preview" style="background:#0b0d10;"></div><span class="theme-name">Dark</span></div>
      <div class="settings-theme-option" data-theme="light"><div class="theme-preview" style="background:#f5f7fa;border-color:#d1d5db;"></div><span class="theme-name">Light</span></div>
      <div class="settings-theme-option" data-theme="blue"><div class="theme-preview" style="background:linear-gradient(145deg,#0a1f2e,#0b2b3f);"></div><span class="theme-name">Blue</span></div>
      <div class="settings-theme-option" data-theme="green"><div class="theme-preview" style="background:linear-gradient(145deg,#0f2a1a,#143f25);"></div><span class="theme-name">Green</span></div>
      <div class="settings-theme-option" data-theme="rose"><div class="theme-preview" style="background:linear-gradient(145deg,#2f1a2b,#4a243d);"></div><span class="theme-name">Rose</span></div>
      <div class="settings-theme-option" data-theme="amber"><div class="theme-preview" style="background:linear-gradient(145deg,#2f2413,#4d3a1a);"></div><span class="theme-name">Amber</span></div>
    </div>
  </div>
</div>

<!-- ============================================= -->
<!-- USER LIST MODAL                                -->
<!-- ============================================= -->
<div id="userListModal">
  <div class="user-list-card">
    <button class="close-btn" id="closeUserListModal"><i class="fas fa-times"></i></button>
    <h3 id="userListTitle"><i class="fas fa-users"></i> Users</h3>
    <div class="user-list-items" id="userListItems"><div style="text-align:center;padding:1rem;opacity:0.5;">Loading...</div></div>
  </div>
</div>

<!-- ============================================= -->
<!-- REACTION USERS MODAL                           -->
<!-- ============================================= -->
<div id="reactionUsersModal">
  <div class="reaction-users-card">
    <button class="close-btn" id="closeReactionUsersModal"><i class="fas fa-times"></i></button>
    <h3 id="reactionUsersTitle"><i class="fas fa-reactions"></i> Reactions</h3>
    <div class="reaction-users-list" id="reactionUsersList"><div style="text-align:center;padding:1rem;opacity:0.5;">Loading...</div></div>
  </div>
</div>

<!-- ============================================= -->
<!-- MAIN APP                                       -->
<!-- ============================================= -->
<div class="app-container">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo" onclick="goHome()"><i class="fas fa-folder-open"></i> Secret<span style="font-weight:400;">Social</span></div>
    <div class="user-info">
      <span id="syncStatus" style="font-size:0.7rem;opacity:0.5;"></span>
      <button class="btn btn-outline" id="settingsBtn"><i class="fas fa-gear"></i></button>
      <div id="userDisplay" style="display:none;align-items:center;gap:0.5rem;cursor:pointer;" onclick="viewMyProfile()">
        <img id="userAvatarDisplay" class="user-avatar" src="" alt="Avatar">
        <span id="userNameDisplay" style="font-weight:600;font-size:0.9rem;"></span>
      </div>
      <button class="btn btn-gold" id="authBtn"><i class="fas fa-user"></i> Login</button>
      <button class="btn btn-outline" id="logoutBtn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 Search users...">
    <button class="btn btn-primary" id="searchBtn"><i class="fas fa-search"></i> Search</button>
  </div>
  <div class="search-results" id="searchResults"><div id="searchResultsList"></div></div>

  <!-- ============================================= -->
  <!-- MAIN FEED (hidden when profile is shown)      -->
  <!-- ============================================= -->
  <div id="mainFeed" class="main-feed">
    <div class="feed-nav" id="feedNav">
      <button class="feed-nav-btn active" data-filter="following"><i class="fas fa-rss"></i> Following</button>
      <button class="feed-nav-btn" data-filter="global"><i class="fas fa-globe"></i> Global</button>
      <button class="feed-nav-btn" data-filter="my"><i class="fas fa-user"></i> My Posts</button>
    </div>

    <button class="create-post-toggle" id="createPostToggle"><i class="fas fa-pen-fancy"></i> Create a new post</button>

    <div id="createPostArea" class="create-post-area">
      <h4 style="margin-bottom:0.5rem;"><i class="fas fa-pen-fancy"></i> Create Post</h4>
      <input type="text" id="postTitleInput" placeholder="Post title..." style="width:100%;padding:0.6rem 1rem;border-radius:16px;border:none;background:rgba(0,0,0,0.2);color:inherit;margin-bottom:0.5rem;outline:1px solid rgba(255,255,255,0.05);">
      <div id="quillEditor"></div>
      <div class="post-options-grid">
        <button class="post-option-btn active" data-type="text"><i class="fas fa-font"></i> Text</button>
        <button class="post-option-btn" data-type="image"><i class="fas fa-image"></i> Image</button>
        <button class="post-option-btn" data-type="gif"><i class="fas fa-film"></i> GIF</button>
        <button class="post-option-btn" data-type="spotify"><i class="fab fa-spotify"></i> Spotify</button>
        <button class="post-option-btn" data-type="pinned"><i class="fas fa-thumbtack"></i> Pin</button>
      </div>
      <div class="file-input-wrapper" id="fileUploadWrapper" style="display:none;">
        <label class="btn btn-outline" for="fileInput"><i class="fas fa-upload"></i> Choose File</label>
        <input type="file" id="fileInput" accept="image/*,.gif">
        <img id="filePreview" class="file-preview" alt="Preview">
      </div>
      <div class="spotify-input-wrapper" id="spotifyWrapper" style="display:none;">
        <i class="fab fa-spotify" style="color:#1DB954;"></i>
        <input type="text" id="spotifyInput" placeholder="Paste Spotify URL">
      </div>
      <div class="create-actions">
        <button class="btn btn-primary" id="createPostBtn"><i class="fas fa-plus-circle"></i> Publish</button>
        <button class="btn btn-outline" id="clearPostBtn"><i class="fas fa-times"></i> Clear</button>
      </div>
    </div>

    <div id="suggestionsBox" class="suggestions-box" style="display:none;">
      <h4><i class="fas fa-users"></i> Who to follow</h4>
      <div id="suggestionsList"></div>
    </div>

    <div class="posts-section" id="postsFeed">
      <div class="empty-state"><div class="loading-spinner"></div><p>Loading posts...</p></div>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- PROFILE PAGE                                  -->
  <!-- ============================================= -->
  <div id="profilePage">
    <button class="btn btn-back" onclick="goHome()" style="margin-bottom:1rem;">
      <i class="fas fa-arrow-left"></i> Back to Feed
    </button>

    <div class="profile-header" id="profileHeader">
      <img id="profilePageAvatar" class="profile-header-avatar" src="" alt="Avatar">
      <div class="profile-header-username" id="profilePageUsername">Username</div>
      <div class="profile-header-bio" id="profilePageBio">No bio yet</div>
      <div class="profile-header-stats">
        <div class="profile-header-stat" id="profilePagePostStat">
          <div class="stat-number" id="profilePagePostCount">0</div>
          <div class="stat-label">Posts</div>
        </div>
        <div class="profile-header-stat" onclick="showUserList('followers')">
          <div class="stat-number" id="profilePageFollowersCount">0</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="profile-header-stat" onclick="showUserList('following')">
          <div class="stat-number" id="profilePageFollowingCount">0</div>
          <div class="stat-label">Following</div>
        </div>
      </div>
      <div class="profile-header-actions">
        <div id="profilePageFollowBtn"></div>
        <button class="btn btn-outline" id="profilePageQRBtn"><i class="fas fa-qrcode"></i> QR</button>
        <button class="btn btn-outline" id="profilePageEditBtn" style="display:none;"><i class="fas fa-edit"></i> Edit Bio</button>
      </div>
    </div>

    <div class="profile-feed">
      <div class="profile-feed-title"><i class="fas fa-pen-fancy"></i> Posts</div>
      <div id="profilePageFeed">
        <div class="empty-state"><div class="loading-spinner"></div><p>Loading posts...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Custom JavaScript -->
<script src="script.js"></script>
</body>
</html>
