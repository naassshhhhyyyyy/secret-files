<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔐 Secret Social</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* ============================================= */
    /* ALL STYLES - Same as before with additions   */
    /* ============================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0d10;
      color: #f0f3f8;
      transition: background 0.3s, color 0.2s;
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    body.light { background: #f5f7fa; color: #1e2329; }
    body.blue { background: linear-gradient(145deg, #0a1f2e, #0b2b3f); color: #e3f0ff; }
    body.green { background: linear-gradient(145deg, #0f2a1a, #143f25); color: #daf5e8; }
    body.rose { background: linear-gradient(145deg, #2f1a2b, #4a243d); color: #fae2f0; }
    body.amber { background: linear-gradient(145deg, #2f2413, #4d3a1a); color: #faf0d6; }
    
    .app-container {
      max-width: 860px;
      width: 100%;
      background: rgba(20, 24, 30, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 42px;
      padding: 1.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.04);
    }
    body.light .app-container {
      background: rgba(240, 244, 250, 0.75);
      border: 1px solid rgba(0,0,0,0.04);
    }
    
    /* Auth Modal */
    #authModal {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.92);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 1.5rem;
    }
    #authModal.show { display: flex; }
    
    .auth-card {
      background: rgba(25, 30, 38, 0.95);
      padding: 2.5rem;
      border-radius: 48px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .auth-card h2 { text-align: center; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
    .auth-card input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 0.8rem;
      outline: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }
    .auth-card input:focus { outline: 2px solid #3b82f6; }
    .auth-card input::placeholder { color: rgba(255,255,255,0.3); }
    .auth-card .btn { width: 100%; justify-content: center; padding: 0.8rem; }
    .auth-card .switch-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; opacity: 0.6; cursor: pointer; transition: 0.2s; }
    .auth-card .switch-link:hover { opacity: 1; }
    .auth-error { color: #f87171; margin-top: 0.5rem; font-size: 0.85rem; text-align: center; }
    
    /* Top Bar */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; font-size: 1.6rem; font-weight: 700; }
    .logo i { color: #ffb347; }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #3b82f6;
      cursor: pointer;
    }
    
    .btn {
      background: rgba(255,255,255,0.06);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      color: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .btn-primary { background: #3b82f6; color: white; border: none; }
    .btn-primary:hover { background: #2563eb; transform: scale(0.97); }
    .btn-danger { background: #e5484d; color: white; }
    .btn-danger:hover { background: #c73b3f; }
    .btn-gold { background: #f59e0b; color: #1e2329; }
    .btn-gold:hover { background: #d97706; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); }
    .btn-outline:hover { background: rgba(255,255,255,0.06); }
    .btn-sm { padding: 0.2rem 0.7rem; font-size: 0.75rem; }
    .btn-follow { background: #3b82f6; color: white; }
    .btn-follow:hover { background: #2563eb; }
    .btn-unfollow { background: #6b7280; color: white; }
    .btn-unfollow:hover { background: #4b5563; }
    
    /* Search Bar */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      outline: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
      min-width: 150px;
    }
    .search-bar input:focus { outline: 2px solid #3b82f6; }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
    
    /* Search Results */
    .search-results {
      background: rgba(0,0,0,0.15);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .search-results.show { display: block; }
    .search-result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .search-result-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }
    .search-result-username { font-size: 0.85rem; font-weight: 500; }
    
    /* Feed Nav */
    .feed-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .feed-nav-btn {
      background: none;
      border: none;
      color: inherit;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      opacity: 0.5;
      transition: 0.2s;
    }
    .feed-nav-btn:hover { opacity: 0.8; background: rgba(255,255,255,0.05); }
    .feed-nav-btn.active { opacity: 1; background: rgba(59,130,246,0.2); color: #3b82f6; }
    
    /* Create Post Toggle Button */
    .create-post-toggle {
      width: 100%;
      padding: 0.8rem;
      border-radius: 32px;
      background: rgba(59,130,246,0.1);
      border: 2px dashed rgba(59,130,246,0.3);
      color: inherit;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.2s;
      margin-bottom: 1.5rem;
    }
    .create-post-toggle:hover { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
    
    /* Create Post Area */
    .create-post-area {
      background: rgba(0,0,0,0.15);
      border-radius: 32px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
    }
    .create-post-area.show { display: block; }
    
    #quillEditor {
      min-height: 150px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      color: inherit;
    }
    .ql-toolbar.ql-snow {
      border: none;
      background: rgba(255,255,255,0.05);
      border-radius: 16px 16px 0 0;
      padding: 0.5rem;
    }
    .ql-container.ql-snow {
      border: none;
      min-height: 120px;
    }
    .ql-editor {
      color: inherit;
      min-height: 100px;
    }
    .ql-editor.ql-blank::before { color: rgba(255,255,255,0.3); }
    .ql-toolbar.ql-snow .ql-stroke { stroke: currentColor; }
    .ql-toolbar.ql-snow .ql-fill { fill: currentColor; }
    
    .post-options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.5rem;
      margin: 0.8rem 0;
    }
    .post-option-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .post-option-btn.active { border-color: #3b82f6; background: rgba(59,130,246,0.2); }
    .post-option-btn:hover { border-color: #3b82f6; }
    
    .file-input-wrapper { margin: 0.5rem 0; }
    .file-input-wrapper input[type="file"] { display: none; }
    .file-preview { max-width: 200px; max-height: 150px; border-radius: 12px; display: none; margin: 0.5rem 0; }
    .file-preview.show { display: block; }
    
    .spotify-input-wrapper { display: flex; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
    .spotify-input-wrapper input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: inherit;
    }
    .spotify-input-wrapper input:focus { outline: 2px solid #3b82f6; }
    
    .create-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
    
    /* Post Items */
    .post-item {
      background: rgba(0,0,0,0.2);
      border-radius: 28px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #3b82f6;
      transition: 0.2s;
    }
    body.light .post-item { background: rgba(255,255,255,0.5); }
    .post-item.pinned { border-left-color: #f59e0b; }
    
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .post-author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .post-author:hover .post-author-name { text-decoration: underline; }
    .post-author-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .post-author-name { font-weight: 600; font-size: 0.9rem; }
    .post-title { font-size: 1.2rem; font-weight: 600; margin: 0.3rem 0; }
    .post-meta { font-size: 0.7rem; opacity: 0.5; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .post-content { font-size: 1rem; line-height: 1.7; margin: 0.5rem 0; }
    .post-content img { max-width: 100%; border-radius: 16px; margin: 0.3rem 0; }
    .post-content iframe { width: 100%; height: 80px; border-radius: 16px; border: none; }
    
    .pinned-badge { background: #f59e0b; color: #1e2329; padding: 0.1rem 0.6rem; border-radius: 20px; font-size: 0.6rem; font-weight: 700; }
    
    /* Reactions */
    .post-reactions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0; }
    .reaction-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .reaction-btn:hover { background: rgba(255,255,255,0.1); }
    .reaction-btn.active { background: rgba(59,130,246,0.3); }
    .reaction-count { font-size: 0.7rem; opacity: 0.6; cursor: pointer; }
    .reaction-count:hover { opacity: 1; text-decoration: underline; }
    
    /* Reaction Users Modal */
    #reactionUsersModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9995;
      padding: 1.5rem;
    }
    #reactionUsersModal.show { display: flex; }
    .reaction-users-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      position: relative;
    }
    .reaction-users-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .reaction-users-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    .reaction-users-list { max-height: 300px; overflow-y: auto; margin-top: 1rem; }
    .reaction-user-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .reaction-user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .reaction-user-username { font-size: 0.85rem; cursor: pointer; }
    .reaction-user-username:hover { text-decoration: underline; }
    
    /* Comments */
    .comments-section {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .comment-item {
      padding: 0.5rem 0;
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
    }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .comment-body { flex: 1; font-size: 0.9rem; }
    .comment-author { font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    .comment-author:hover { text-decoration: underline; }
    .comment-text { margin-top: 0.1rem; }
    .comment-time { font-size: 0.65rem; opacity: 0.4; }
    .comment-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }
    .comment-actions .btn { padding: 0.1rem 0.5rem; font-size: 0.65rem; }
    
    .comment-input-wrapper {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .comment-input-wrapper input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      outline: 1px solid rgba(255,255,255,0.05);
    }
    .comment-input-wrapper input:focus { outline: 2px solid #3b82f6; }
    
    .post-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .post-actions .btn { padding: 0.2rem 0.8rem; font-size: 0.75rem; }
    
    /* QR Modal */
    #qrModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 1.5rem;
    }
    #qrModal.show { display: flex; }
    .qr-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 350px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    .qr-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .qr-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    #qrContainer { display: flex; justify-content: center; margin: 1rem 0; }
    
    /* Settings Modal */
    #settingsModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9997;
      padding: 1.5rem;
    }
    #settingsModal.show { display: flex; }
    .settings-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      position: relative;
    }
    .settings-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .settings-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    .settings-theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .settings-theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-theme-option:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
    .settings-theme-option.active { border-color: #3b82f6; background: rgba(59,130,246,0.15); }
    .settings-theme-option .theme-preview { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }
    .settings-theme-option .theme-name { font-size: 0.7rem; opacity: 0.6; }
    .settings-theme-option.active .theme-name { opacity: 1; color: #3b82f6; }
    
    /* Profile Modal */
    #profileModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9996;
      padding: 1.5rem;
    }
    #profileModal.show { display: flex; }
    .profile-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .profile-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .profile-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; margin: 0.5rem auto; }
    .profile-username { font-size: 1.3rem; font-weight: 600; }
    .profile-bio { opacity: 0.6; font-size: 0.9rem; margin: 0.5rem 0; }
    .profile-stats { display: flex; justify-content: center; gap: 2rem; margin: 1rem 0; }
    .profile-stat { text-align: center; cursor: pointer; }
    .profile-stat:hover .profile-stat-number { color: #3b82f6; }
    .profile-stat-number { font-size: 1.2rem; font-weight: 600; transition: 0.2s; }
    .profile-stat-label { font-size: 0.7rem; opacity: 0.5; }
    .profile-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    
    /* Followers/Following List Modal */
    #userListModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9994;
      padding: 1.5rem;
    }
    #userListModal.show { display: flex; }
    .user-list-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      position: relative;
    }
    .user-list-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .user-list-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    .user-list-items { max-height: 300px; overflow-y: auto; margin-top: 1rem; }
    .user-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;

  // ---------- AUTH ----------
  let isLoginMode = true;

    authEmail.style.display = isLoginMode ? 'none' : 'block';
    authError.textContent = '';
  });

  authSubmitBtn.addEventListener('click', async function() {
    const username = authUsername.value.trim();
    const email = isLoginMode ? '' : authEmail.value.trim();
    const password = authPassword.value;
    
    if (!username || !password) { authError.textContent = 'Please fill in all fields.'; return; }
    if (!isLoginMode && !email) { authError.textContent = 'Email is required for signup.'; return; }
    
    authError.textContent = '';
    
    try {
      if (isLoginMode) {
        const { data, error } = await supabase
          .from('users')
          .select('*')
          .eq('username', username)
          .eq('password_hash', password)
          .single();
        
        if (error || !data) { throw new Error('Invalid username or password'); }
        
        currentUser = data;
        localStorage.setItem('currentUser', JSON.stringify(data));
        hideAuthModal();
        updateUI();
        await loadAllData();

        const { data: existing } = await supabase
          .from('users')

          .eq('username', username)
          .maybeSingle();
        
        if (existing) { throw new Error('Username already taken'); }
        
        const { data, error } = await supabase

  searchBtn.addEventListener('click', function() {
    performSearch();
  });

  searchInput.addEventListener('keydown', function(e) {

  });

  function performSearch() {
    const query = searchInput.value.trim().toLowerCase();
    if (!query) {
      searchResults.classList.remove('show');
      return;
    }
    
    const results = allUsers.filter(function(u) {
      return u.username.toLowerCase().includes(query) && u.id !== currentUser?.id;
    });
    
    if (results.length === 0) {
      searchResultsList.innerHTML = '<div style="padding:0.5rem;text-align:center;opacity:0.5;">No users found</div>';

      searchResultsList.innerHTML = results.map(function(u) {

  // ---------- FILTER POSTS ----------
  function filterPosts() {
    let filtered = [...allPosts];
    
    if (currentFilter === 'my' && currentUser) {
      filtered = filtered.filter(function(p) { return p.author_id === currentUser.id; });
    } else if (currentFilter === 'following' && currentUser) {
      supabase.from('followers')
        .select('following_id')
        .eq('follower_id', currentUser.id)
        .then(function(result) {
          var data = result.data || [];
          var followingIds = data.map(function(f) { return f.following_id; });
          if (followingIds.length === 0) {
            renderFilteredPosts(filtered);
            return;
          }
          var filteredPosts = filtered.filter(function(p) {
            return followingIds.includes(p.author_id) || p.author_id === currentUser.id;
          });
          renderFilteredPosts(filteredPosts);
        });
      return;
    }
    
    renderFilteredPosts(filtered);
  }

  function renderFilteredPosts(posts) {
    posts.sort(function(a, b) {
      if (a.is_pinned && !b.is_pinned) return -1;
      if (!a.is_pinned && b.is_pinned) return 1;
      return new Date(b.created_at) - new Date(a.created_at);
    });
    renderPosts(posts);
  }

  // ---------- FEED NAV ----------
  feedNavBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      feedNavBtns.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      filterPosts();
    });
  });

         "No posts yet. Be the first to create one!") +

    var html = '';
    for (var i = 0; i < posts.length; i++) {
      var post = posts[i];

      var authorName = post.users?.username || 'Unknown';
      var authorAvatar = post.users?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(authorName) + '&background=3b82f6&color=fff&size=64';

      }
      html += '</div>';
      html += '<div class="post-meta">' + new Date(post.created_at).toLocaleString() + (post.updated_at !== post.created_at ? ' (edited)' : '') + '</div>';
      html += '</div>';
      html += '<div class="post-content">' + post.content_html + '</div>';
      if (post.media_data) {
        html += renderMedia(post);
      }
      
      html += '<div class="post-reactions" id="reactions-' + post.id + '">';
      html += '<span style="font-size:0.8rem;opacity:0.5;">Loading reactions...</span>';
      html += '</div>';
      
      html += '<div class="comments-section" id="comments-' + post.id + '">';
      html += '<div id="commentsList-' + post.id + '"></div>';

      if (isAuthor) {
        html += '<button class="btn btn-outline" onclick="editPost(' + post.id + ')"><i class="fas fa-edit"></i> Edit</button>';
        html += '<button class="btn btn-danger" onclick="deletePost(' + post.id + ')"><i class="fas fa-trash"></i> Delete</button>';
      }
      html += '<button class="btn btn-outline" onclick="showQR(\'post\', ' + post.id + ', \'' + encodeURIComponent(post.title || 'Post') + '\')"><i class="fas fa-qrcode"></i> QR</button>';
      html += '<button class="btn btn-outline" onclick="sharePost(' + post.id + ')"><i class="fas fa-share-alt"></i> Share</button>';

    for (var j = 0; j < posts.length; j++) {

  function renderMedia(post) {
    var mediaType = post.media_type || '';
    var mediaData = post.media_data || '';
    
    if (mediaType.includes('image') || mediaType === 'image') {
      return '<img src="' + mediaData + '" alt="Image" loading="lazy" style="max-width:100%;border-radius:16px;margin:0.3rem 0;">';
    } else if (mediaType.includes('gif') || mediaType === 'gif') {
      return '<img src="' + mediaData + '" alt="GIF" loading="lazy" style="max-width:100%;border-radius:16px;margin:0.3rem 0;">';
    } else if (mediaType.includes('spotify') || mediaType === 'spotify') {
      var match = mediaData.match(/spotify\.com\/(track|playlist|episode)\/([a-zA-Z0-9]+)/);
      if (match) {
        return '<iframe src="https://open.spotify.com/embed/' + match[1] + '/' + match[2] + '" allow="encrypted-media" style="width:100%;height:80px;border-radius:16px;border:none;"></iframe>';
      }
      return '<a href="' + mediaData + '" target="_blank">' + mediaData + '</a>';
    }
    return '';
  }

  var REACTION_EMOJIS = {
    like: '👍',
    heart: '❤️',
    funny: '😂',

    sad: '😢'
  };

  window.toggleReaction = async function(postId, type) {

    try {
      var { data: existing } = await supabase
        .from('post_reactions')
        .select('id')
        .eq('post_id', postId)
        .eq('user_id', currentUser.id)
        .eq('reaction_type', type)
        .maybeSingle();
      
      if (existing) {
        await supabase.from('post_reactions').delete().eq('id', existing.id);
      } else {
        await supabase.from('post_reactions').insert([{
          post_id: postId,
          user_id: currentUser.id,
          reaction_type: type
        }]);
      }
      
      loadReactions(postId);
    } catch (error) {
      console.error('Error toggling reaction:', error);
    }
  };

  async function loadReactions(postId) {
    try {
      var { data, error } = await supabase
        .from('post_reactions')
        .select('reaction_type, user_id, users!post_reactions_user_id_fkey (id, username, avatar_url)')
        .eq('post_id', postId);
      
      if (error) throw error;
      
      var container = document.getElementById('reactions-' + postId);
      if (!container) return;
      
      var counts = {};
      for (var i = 0; i < data.length; i++) {
        var r = data[i];
        counts[r.reaction_type] = (counts[r.reaction_type] || 0) + 1;
      }
      
      var userReactions = [];
      for (var j = 0; j < data.length; j++) {
        if (currentUser && data[j].user_id === currentUser.id) {
          userReactions.push(data[j].reaction_type);
        }
      }
      
      var html = '';
      for (var key in REACTION_EMOJIS) {
        var emoji = REACTION_EMOJIS[key];
        var active = userReactions.includes(key) ? 'active' : '';
        var count = counts[key] || 0;
        html += '<button class="reaction-btn ' + active + '" onclick="toggleReaction(' + postId + ', \'' + key + '\')">';
        html += emoji + ' <span class="reaction-count" onclick="event.stopPropagation(); showReactionUsers(' + postId + ', \'' + key + '\')">' + count + '</span>';
        html += '</button>';
      }
      container.innerHTML = html;
      
      // Store reaction data for later use
      window._reactionData = window._reactionData || {};
      window._reactionData[postId] = data;
    } catch (error) {
      console.error('Error loading reactions:', error);
    }
  }

  async function loadSuggestions() {

      suggestionsBox.style.display = 'none';
      return;
    }
    
    try {
      var { data: following } = await supabase
        .from('followers')
        .select('following_id')
        .eq('follower_id', currentUser.id);
      
      var followingIds = (following || []).map(function(f) { return f.following_id; });
      
      var suggestions = [];
      for (var i = 0; i < allUsers.length; i++) {
        var u = allUsers[i];
        if (u.id !== currentUser.id && !followingIds.includes(u.id)) {
          suggestions.push(u);
        }
      }
      suggestions = suggestions.slice(0, 5);
      
      if (suggestions.length === 0) {
        suggestionsBox.style.display = 'none';
        return;

      for (var j = 0; j < suggestions.length; j++) {

        .order('changed_at', { ascending: false });
      
      if (error) throw error;
      
      if (!data || data.length === 0) {
        alert('No history available for this post.');
        return;
      }
      
      var msg = '📜 Post History:\n\n';
      for (var i = 0; i < data.length; i++) {
        var h = data[i];
        msg += 'Version ' + (data.length - i) + ' (' + new Date(h.changed_at).toLocaleString() + '):\n';
        msg += h.content.substring(0, 200) + (h.content.length > 200 ? '...' : '') + '\n\n';
      }
      alert(msg);
    } catch (error) {
      alert('Error loading history: ' + error.message);
    }
  };

  // ---------- CREATE POST ----------
  createBtn.addEventListener('click', async function() {
    if (!currentUser) { showAuthModal(); return; }
    
    var title = postTitleInput.value.trim();
    var content = quill.root.innerHTML;
    var textContent = quill.getText().trim();
    
    if (!textContent && !uploadedFileDataURL && !spotifyInput.value.trim()) {
      alert('Please add some content to your post.');
      return;
    }
    
    var mediaData = '';
    var mediaType = selectedPostType;
    
    if (uploadedFileDataURL) {
      mediaData = uploadedFileDataURL;
      mediaType = selectedPostType.includes('gif') ? 'gif' : 'image';
    } else if (spotifyInput.value.trim()) {
      mediaData = spotifyInput.value.trim();
      mediaType = 'spotify';
    }
    
    var isPinned = selectedPostType === 'pinned';
    
    var postData = {
      title: title,
      content: textContent,
      content_html: content,
      author_id: currentUser.id,
      timestamp: new Date().toISOString(),
      media_data: mediaData,
      media_type: mediaType,
      is_pinned: isPinned
    };
    
    try {
      if (editingPostId) {
        var { error } = await supabase
          .from('posts')
          .update(Object.assign({}, postData, { updated_at: new Date().toISOString() }))
          .eq('id', editingPostId)
          .eq('author_id', currentUser.id);
        
        if (error) throw error;
        
        await supabase.from('post_history').insert([{
          post_id: editingPostId,
          content: textContent,
          content_html: content
        }]);
        
        editingPostId = null;
      } else {
        var { error } = await supabase.from('posts').insert([postData]);
        if (error) throw error;
      }
      
      clearBtn.click();
      createArea.classList.remove('show');
      createPostToggle.innerHTML = '<i class="fas fa-pen-fancy"></i> Create a new post';
      await loadPosts();
    } catch (error) {
      alert('Error saving post: ' + error.message);
    }
  });

  // ---------- POST TYPE SELECTION ----------
  postOptionBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      postOptionBtns.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      selectedPostType = this.dataset.type;
      updatePostTypeUI(selectedPostType);
    });
  });

  function updatePostTypeUI(type) {
    fileUploadWrapper.style.display = 'none';
    spotifyWrapper.style.display = 'none';
    filePreview.classList.remove('show');
    uploadedFileDataURL = null;
    
    if (type === 'image' || type === 'text-image') {
      fileUploadWrapper.style.display = 'block';
      fileInput.accept = 'image/*';
    } else if (type === 'gif' || type === 'text-gif') {
      fileUploadWrapper.style.display = 'block';
      fileInput.accept = 'image/gif';
    } else if (type === 'spotify' || type === 'text-spotify') {
      spotifyWrapper.style.display = 'flex';
    }
  }

  fileInput.addEventListener('change', function(e) {
    var file = this.files[0];
    if (file) {
      var reader = new FileReader();
      reader.onload = function(event) {
        uploadedFileDataURL = event.target.result;
        filePreview.src = event.target.result;
        filePreview.classList.add('show');
      };
      reader.readAsDataURL(file);
    }
  });

  clearBtn.addEventListener('click', function() {
    postTitleInput.value = '';
    quill.setText('');
    fileInput.value = '';
    filePreview.classList.remove('show');
    uploadedFileDataURL = null;
    spotifyInput.value = '';
    editingPostId = null;
  });

  // ---------- SHARING ----------
  window.sharePost = function(postId) {
    var post = allPosts.find(function(p) { return p.id === postId; });
    if (!post) return;
    
    var url = window.location.href + '?post=' + postId;
    var text = post.title || 'Check out this post!';
    
    if (navigator.share) {
      navigator.share({
        title: text,
        text: post.content?.substring(0, 100) || '',
        url: url
      }).catch(function() {});
    } else {
      navigator.clipboard.writeText(url).then(function() {
        alert('🔗 Link copied to clipboard! Share it with others.');
      }).catch(function() {
        prompt('Copy this link:', url);
      });
    }
  };

  // ---------- QR CODE ----------
  window.showQR = function(type, id, label) {
    var url = window.location.href + '?' + type + '=' + id;
    currentQRData = { type: type, id: id, url: url, label: label };
    
    qrContainer.innerHTML = '';
    qrCodeInstance = new QRCode(qrContainer, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#ffffff',
      colorLight: '#0b0d10',
      correctLevel: QRCode.CorrectLevel.H
    });
    
    qrLabel.textContent = 'Scan to view ' + (label || 'this');
    qrModal.classList.add('show');
  };

  closeQRModal.addEventListener('click', function() { qrModal.classList.remove('show'); });
  qrModal.addEventListener('click', function(e) {
    if (e.target === qrModal) qrModal.classList.remove('show');
  });

  downloadQRBtn.addEventListener('click', function() {
    var canvas = qrContainer.querySelector('canvas');
    if (canvas) {
      var link = document.createElement('a');
      link.download = 'qr-' + (currentQRData?.type || 'code') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  });

  // ---------- SETTINGS ----------
  settingsBtn.addEventListener('click', function() { settingsModal.classList.add('show'); });
  closeSettingsModal.addEventListener('click', function() { settingsModal.classList.remove('show'); });
  settingsModal.addEventListener('click', function(e) {
    if (e.target === settingsModal) settingsModal.classList.remove('show');
  });

  settingsThemeGrid.querySelectorAll('.settings-theme-option').forEach(function(option) {
    option.addEventListener('click', function() {
      var theme = this.dataset.theme;
      document.body.className = theme;
      settingsThemeGrid.querySelectorAll('.settings-theme-option').forEach(function(el) { el.classList.remove('active'); });
      this.classList.add('active');
      localStorage.setItem('selected_theme', theme);
    });
  });

  // ---------- SYNC STATUS ----------
  function updateSyncStatus(status) {
    if (!syncStatus) return;
    var icons = { Synced: 'fa-check-circle', Loading: 'fa-spinner fa-spin', Error: 'fa-exclamation-circle' };
    syncStatus.innerHTML = '<i class="fas ' + (icons[status] || 'fa-circle') + '"></i> ' + status;
  }

  // ---------- INIT ----------
  function init() {
    // Restore theme
    var savedTheme = localStorage.getItem('selected_theme') || 'dark';
    document.body.className = savedTheme;
    var activeOption = document.querySelector('.settings-theme-option[data-theme="' + savedTheme + '"]');
    if (activeOption) activeOption.classList.add('active');

    // Check session
    var savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        updateUI();
        loadAllData();
      } catch(e) { localStorage.removeItem('currentUser'); }
    } else {
      updateUI();
      loadAllData();
    }

    // Block devtools
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
        e.preventDefault(); return false;
      }
      if (e.ctrlKey && e.key === 'p') { e.preventDefault(); return false; }
    });

    console.log('🚀 Secret Social Network Loaded');
    console.log('👤 Everyone must sign up to post!');
    console.log('📌 Following feed shows posts from people you follow');
    console.log('🌍 Global feed shows all posts');
    console.log('📝 Users can only edit/delete their own posts');
    console.log('🔍 Search for users using the search bar');
    console.log('👥 Click on followers/following counts to see lists');
    console.log('❤️ Click on reaction counts to see who reacted');
  }

  // Run
  init();
})();
</script>
</body>
</html>
