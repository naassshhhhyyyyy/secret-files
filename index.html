<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔐 Secret Social</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0d10;
      color: #f0f3f8;
      transition: background 0.3s, color 0.2s;
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    body.light { background: #f5f7fa; color: #1e2329; }
    body.blue { background: linear-gradient(145deg, #0a1f2e, #0b2b3f); color: #e3f0ff; }
    body.green { background: linear-gradient(145deg, #0f2a1a, #143f25); color: #daf5e8; }
    body.rose { background: linear-gradient(145deg, #2f1a2b, #4a243d); color: #fae2f0; }
    body.amber { background: linear-gradient(145deg, #2f2413, #4d3a1a); color: #faf0d6; }
    
    .app-container {
      max-width: 860px;
      width: 100%;
      background: rgba(20, 24, 30, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 42px;
      padding: 1.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.04);
    }
    body.light .app-container {
      background: rgba(240, 244, 250, 0.75);
      border: 1px solid rgba(0,0,0,0.04);
    }
    
    /* ============================================= */
    /* AUTH MODAL                                    */
    /* ============================================= */
    #authModal {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.92);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 1.5rem;
    }
    #authModal.show { display: flex; }
    
    .auth-card {
      background: rgba(25, 30, 38, 0.95);
      padding: 2.5rem;
      border-radius: 48px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .auth-card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .auth-card input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 0.8rem;
      outline: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }
    .auth-card input:focus { outline: 2px solid #3b82f6; }
    .auth-card input::placeholder { color: rgba(255,255,255,0.3); }
    .auth-card .btn { width: 100%; justify-content: center; padding: 0.8rem; }
    .auth-card .switch-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.6;
      cursor: pointer;
      transition: 0.2s;
    }
    .auth-card .switch-link:hover { opacity: 1; }
    .auth-error { color: #f87171; margin-top: 0.5rem; font-size: 0.85rem; text-align: center; }
    
    /* ============================================= */
    /* TOP BAR                                       */
    /* ============================================= */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .logo i { color: #ffb347; }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #3b82f6;
      cursor: pointer;
    }
    .user-avatar-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    .btn {
      background: rgba(255,255,255,0.06);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      color: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .btn-primary { background: #3b82f6; color: white; border: none; }
    .btn-primary:hover { background: #2563eb; transform: scale(0.97); }
    .btn-danger { background: #e5484d; color: white; }
    .btn-danger:hover { background: #c73b3f; }
    .btn-gold { background: #f59e0b; color: #1e2329; }
    .btn-gold:hover { background: #d97706; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); }
    .btn-outline:hover { background: rgba(255,255,255,0.06); }
    .btn-sm { padding: 0.2rem 0.7rem; font-size: 0.75rem; }
    .btn-follow { background: #3b82f6; color: white; }
    .btn-follow:hover { background: #2563eb; }
    .btn-unfollow { background: #6b7280; color: white; }
    .btn-unfollow:hover { background: #4b5563; }
    
    /* ============================================= */
    /* FEED NAV                                      */
    /* ============================================= */
    .feed-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .feed-nav-btn {
      background: none;
      border: none;
      color: inherit;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      opacity: 0.5;
      transition: 0.2s;
    }
    .feed-nav-btn:hover { opacity: 0.8; background: rgba(255,255,255,0.05); }
    .feed-nav-btn.active { opacity: 1; background: rgba(59,130,246,0.2); color: #3b82f6; }
    
    /* ============================================= */
    /* CREATE POST AREA                              */
    /* ============================================= */
    .create-post-area {
      background: rgba(0,0,0,0.15);
      border-radius: 32px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px dashed rgba(255,255,255,0.08);
      display: none;
    }
    .create-post-area.show { display: block; }
    
    #quillEditor {
      min-height: 150px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      color: inherit;
    }
    .ql-toolbar.ql-snow {
      border: none;
      background: rgba(255,255,255,0.05);
      border-radius: 16px 16px 0 0;
      padding: 0.5rem;
    }
    .ql-container.ql-snow {
      border: none;
      min-height: 120px;
    }
    .ql-editor {
      color: inherit;
      min-height: 100px;
    }
    .ql-editor.ql-blank::before { color: rgba(255,255,255,0.3); }
    .ql-toolbar.ql-snow .ql-stroke { stroke: currentColor; }
    .ql-toolbar.ql-snow .ql-fill { fill: currentColor; }
    
    .post-options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.5rem;
      margin: 0.8rem 0;
    }
    .post-option-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .post-option-btn.active { border-color: #3b82f6; background: rgba(59,130,246,0.2); }
    .post-option-btn:hover { border-color: #3b82f6; }
    
    .file-input-wrapper { margin: 0.5rem 0; }
    .file-input-wrapper input[type="file"] { display: none; }
    .file-preview { max-width: 200px; max-height: 150px; border-radius: 12px; display: none; margin: 0.5rem 0; }
    .file-preview.show { display: block; }
    
    .spotify-input-wrapper { display: flex; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
    .spotify-input-wrapper input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: inherit;
    }
    .spotify-input-wrapper input:focus { outline: 2px solid #3b82f6; }
    
    .create-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
    
    /* ============================================= */
    /* POST ITEMS                                    */
    /* ============================================= */
    .post-item {
      background: rgba(0,0,0,0.2);
      border-radius: 28px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #3b82f6;
      transition: 0.2s;
    }
    body.light .post-item { background: rgba(255,255,255,0.5); }
    .post-item.pinned { border-left-color: #f59e0b; }
    
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .post-author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .post-author:hover .post-author-name { text-decoration: underline; }
    .post-author-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .post-author-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .post-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0.3rem 0;
    }
    .post-meta {
      font-size: 0.7rem;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .post-content {
      font-size: 1rem;
      line-height: 1.7;
      margin: 0.5rem 0;
    }
    .post-content img { max-width: 100%; border-radius: 16px; margin: 0.3rem 0; }
    .post-content iframe { width: 100%; height: 80px; border-radius: 16px; border: none; }
    
    .pinned-badge {
      background: #f59e0b;
      color: #1e2329;
      padding: 0.1rem 0.6rem;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 700;
    }
    
    /* Reactions */
    .post-reactions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin: 0.5rem 0;
    }
    .reaction-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .reaction-btn:hover { background: rgba(255,255,255,0.1); }
    .reaction-btn.active { background: rgba(59,130,246,0.3); }
    .reaction-count { font-size: 0.7rem; opacity: 0.6; }
    
    /* Comments */
    .comments-section {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .comment-item {
      padding: 0.5rem 0;
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
    }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .comment-body { flex: 1; font-size: 0.9rem; }
    .comment-author { font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    .comment-author:hover { text-decoration: underline; }
    .comment-text { margin-top: 0.1rem; }
    .comment-time { font-size: 0.65rem; opacity: 0.4; }
    .comment-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }
    .comment-actions .btn { padding: 0.1rem 0.5rem; font-size: 0.65rem; }
    
    .comment-input-wrapper {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .comment-input-wrapper input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      outline: 1px solid rgba(255,255,255,0.05);
    }
    .comment-input-wrapper input:focus { outline: 2px solid #3b82f6; }
    
    .post-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .post-actions .btn { padding: 0.2rem 0.8rem; font-size: 0.75rem; }
    
    /* ============================================= */
    /* QR MODAL                                      */
    /* ============================================= */
    #qrModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 1.5rem;
    }
    #qrModal.show { display: flex; }
    .qr-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 350px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    .qr-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .qr-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    #qrContainer { display: flex; justify-content: center; margin: 1rem 0; }
    
    /* ============================================= */
    /* SETTINGS MODAL                                */
    /* ============================================= */
    #settingsModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9997;
      padding: 1.5rem;
    }
    #settingsModal.show { display: flex; }
    .settings-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      position: relative;
    }
    .settings-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .settings-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    .settings-theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .settings-theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-theme-option:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
    .settings-theme-option.active { border-color: #3b82f6; background: rgba(59,130,246,0.15); }
    .settings-theme-option .theme-preview {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .settings-theme-option .theme-name { font-size: 0.7rem; opacity: 0.6; }
    .settings-theme-option.active .theme-name { opacity: 1; color: #3b82f6; }
    
    /* ============================================= */
    /* PROFILE MODAL                                 */
    /* ============================================= */
    #profileModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9996;
      padding: 1.5rem;
    }
    #profileModal.show { display: flex; }
    .profile-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    .profile-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .profile-card .close-btn:hover { color: #fff; transform: rotate(90deg); }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3b82f6;
      margin: 0.5rem auto;
    }
    .profile-username { font-size: 1.3rem; font-weight: 600; }
    .profile-bio { opacity: 0.6; font-size: 0.9rem; margin: 0.5rem 0; }
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1rem 0;
    }
    .profile-stat { text-align: center; cursor: pointer; }
    .profile-stat:hover .profile-stat-number { color: #3b82f6; }
    .profile-stat-number { font-size: 1.2rem; font-weight: 600; transition: 0.2s; }
    .profile-stat-label { font-size: 0.7rem; opacity: 0.5; }
    .profile-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .empty-state { text-align: center; padding: 2rem; opacity: 0.5; }
    .empty-state i { font-size: 2rem; }
    .empty-state p { margin-top: 0.5rem; }
    
    /* ============================================= */
    /* FOLLOW SUGGESTIONS                           */
    /* ============================================= */
    .suggestions-box {
      background: rgba(0,0,0,0.15);
      border-radius: 20px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .suggestions-box h4 { margin-bottom: 0.8rem; opacity: 0.6; font-size: 0.9rem; }
    .suggestion-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .suggestion-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }
    .suggestion-username { font-size: 0.85rem; font-weight: 500; }
    
    /* Responsive */
    @media (max-width: 600px) {
      .app-container { padding: 1rem; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .logo { justify-content: center; }
      .user-info { justify-content: center; }
      .post-options-grid { grid-template-columns: repeat(2,1fr); }
      .settings-theme-grid { grid-template-columns: repeat(2,1fr); }
      .feed-nav { justify-content: center; }
      .profile-stats { gap: 1rem; }
    }
    
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body>

<!-- ============================================= -->
<!-- AUTH MODAL                                     -->
<!-- ============================================= -->
<div id="authModal">
  <div class="auth-card">
    <h2 id="authTitle"><i class="fas fa-user"></i> Login</h2>
    <input type="text" id="authUsername" placeholder="Username">
    <input type="email" id="authEmail" placeholder="Email (for signup)">
    <input type="password" id="authPassword" placeholder="Password">
    <button class="btn btn-primary" id="authSubmitBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div class="switch-link" id="authSwitch">Don't have an account? Sign up</div>
    <div id="authError" class="auth-error"></div>
  </div>
</div>

<!-- ============================================= -->
<!-- QR MODAL                                       -->
<!-- ============================================= -->
<div id="qrModal">
  <div class="qr-card">
    <button class="close-btn" id="closeQRModal"><i class="fas fa-times"></i></button>
    <h3><i class="fas fa-qrcode"></i> QR Code</h3>
    <div id="qrContainer"></div>
    <p style="font-size:0.8rem;opacity:0.6;margin-top:0.5rem;" id="qrLabel">Scan to view this</p>
    <button class="btn btn-outline" id="downloadQRBtn"><i class="fas fa-download"></i> Download</button>
  </div>
</div>

<!-- ============================================= -->
<!-- SETTINGS MODAL                                 -->
<!-- ============================================= -->
<div id="settingsModal">
  <div class="settings-card">
    <button class="close-btn" id="closeSettingsModal"><i class="fas fa-times"></i></button>
    <h3><i class="fas fa-palette"></i> Choose Theme</h3>
    <div class="settings-theme-grid" id="settingsThemeGrid">

// ---------- AUTH ----------

authSwitch.addEventListener('click', () => {
  isLoginMode = !isLoginMode;
  authTitle.innerHTML = isLoginMode ? '<i class="fas fa-user"></i> Login' : '<i class="fas fa-user-plus"></i> Sign Up';

  authError.textContent = '';
});

authSubmitBtn.addEventListener('click', async () => {
  const username = authUsername.value.trim();
  const email = isLoginMode ? '' : authEmail.value.trim();
  const password = authPassword.value;
  
  if (!username || !password) { authError.textContent = 'Please fill in all fields.'; return; }
  if (!isLoginMode && !email) { authError.textContent = 'Email is required for signup.'; return; }
  
  authError.textContent = '';
  
  try {
    if (isLoginMode) {
      const { data, error } = await supabase
        .from('users')
        .select('*')
        .eq('username', username)
        .eq('password_hash', password)
        .single();
      
      if (error || !data) { throw new Error('Invalid username or password'); }
      
      currentUser = data;
      localStorage.setItem('currentUser', JSON.stringify(data));
      hideAuthModal();
      updateUI();
      await loadAllData();
    } else {
      const { data: existing } = await supabase
        .from('users')
        .select('id')
        .eq('username', username)
        .maybeSingle();
      
      if (existing) { throw new Error('Username already taken'); }
      
      const { data, error } = await supabase
        .from('users')
        .insert([{
          username: username,
          email: email,
          password_hash: password,
          avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=3b82f6&color=fff&size=128`
        }])
        .select()
        .single();
      
      if (error) throw new Error(error.message);
      
      currentUser = data;
      localStorage.setItem('currentUser', JSON.stringify(data));
      hideAuthModal();
      updateUI();
      await loadAllData();
    }
  } catch (error) {
    authError.textContent = error.message || 'Authentication failed';
  }
});

});

authPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') authSubmitBtn.click(); });

function logout() {
  currentUser = null;

  updateUI();
  allPosts = [];

}

function updateUI() {
  if (currentUser) {
    authBtn.style.display = 'none';

    userDisplay.style.display = 'flex';
    userAvatarDisplay.src = currentUser.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.username)}&background=3b82f6&color=fff&size=128`;
    userNameDisplay.textContent = currentUser.username;

    authBtn.style.display = 'inline-flex';
    logoutBtn.style.display = 'none';

  }
}

// ---------- LOAD ALL DATA ----------
async function loadAllData() {
  await loadUsers();
  await loadPosts();
  await loadSuggestions();
}

async function loadUsers() {
  try {
    const { data, error } = await supabase.from('users').select('*');
    if (error) throw error;
    allUsers = data || [];
  } catch (error) {
    console.error('Error loading users:', error);
  }
}

// ---------- LOAD POSTS ----------
async function loadPosts() {
  try {
    const { data, error } = await supabase
      .from('posts')
      .select(`
        *,
        users!posts_author_id_fkey (id, username, avatar_url)
      `)
      .order('is_pinned', { ascending: false })
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    allPosts = data || [];
    
    // Filter based on current feed
    filterPosts();
    updateSyncStatus('Synced');
  } catch (error) {
    console.error('Error loading posts:', error);
    updateSyncStatus('Error');
    allPosts = [];
    renderPosts();
  }
}

// ---------- FILTER POSTS ----------
function filterPosts() {
  let filtered = [...allPosts];
  
  if (currentFilter === 'my' && currentUser) {
    filtered = filtered.filter(p => p.author_id === currentUser.id);
  } else if (currentFilter === 'following' && currentUser) {
    // Get followed users
    supabase.from('followers')
      .select('following_id')
      .eq('follower_id', currentUser.id)
      .then(({ data }) => {
        const followingIds = data?.map(f => f.following_id) || [];
        // If not following anyone, show all posts (global)
        if (followingIds.length === 0) {
          renderFilteredPosts(filtered);
          return;
        }
        // Show posts from following + own posts
        const filteredPosts = filtered.filter(p => 
          followingIds.includes(p.author_id) || p.author_id === currentUser.id
        );
        renderFilteredPosts(filteredPosts);
      });
    return;
  }
  
  renderFilteredPosts(filtered);
}

function renderFilteredPosts(posts) {
  // Sort: pinned first, then by date
  posts.sort((a, b) => {
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });
  renderPosts(posts);
}

// ---------- FEED NAV ----------
feedNavBtns.forEach(btn => {
  btn.addEventListener('click', function() {
    feedNavBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    filterPosts();
  });
});

// ---------- RENDER POSTS ----------
function renderPosts(postsToRender = null) {
  const posts = postsToRender || allPosts;
  
  if (!postsFeed) return;
  
  if (posts.length === 0) {
    postsFeed.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-inbox"></i>
        <p>${currentFilter === 'my' ? "You haven't posted anything yet." : 
            currentFilter === 'following' ? "No posts from people you follow. Try the Global feed!" :
            "No posts yet. Be the first to create one!"}</p>
      </div>
    `;
    return;
  }
  
  let html = '';
  for (const post of posts) {
    const isAuthor = currentUser && post.author_id === currentUser.id;
    const authorName = post.users?.username || 'Unknown';
    const authorAvatar = post.users?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(authorName)}&background=3b82f6&color=fff&size=64`;
    
    html += `
      <div class="post-item ${post.is_pinned ? 'pinned' : ''}" id="post-${post.id}">
        <div class="post-header">
          <div>
            <div class="post-author" onclick="showProfile(${post.author_id})">
              <img class="post-author-avatar" src="${authorAvatar}" alt="${authorName}">
              <span class="post-author-name">${authorName}</span>
              ${post.is_pinned ? '<span class="pinned-badge"><i class="fas fa-thumbtack"></i> Pinned</span>' : ''}
            </div>
            ${post.title ? `<div class="post-title">${post.title}</div>` : ''}
          </div>
          <div class="post-meta">
            ${new Date(post.created_at).toLocaleString()}
            ${post.updated_at !== post.created_at ? ' (edited)' : ''}
          </div>
        </div>
        <div class="post-content">${post.content_html}</div>
        ${post.media_data ? renderMedia(post) : ''}
        
        <!-- Reactions -->
        <div class="post-reactions" id="reactions-${post.id}">
          ${renderReactionsPlaceholder()}
        </div>
        
        <!-- Comments -->
        <div class="comments-section" id="comments-${post.id}">
          <div id="commentsList-${post.id}"></div>
          ${currentUser ? `
            <div class="comment-input-wrapper">
              <input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." onkeydown="if(event.key==='Enter') addComment(${post.id})">
              <button class="btn btn-primary btn-sm" onclick="addComment(${post.id})"><i class="fas fa-paper-plane"></i></button>
            </div>
          ` : ''}
        </div>
        
        <!-- Actions -->
        <div class="post-actions">
          ${isAuthor ? `
            <button class="btn btn-outline" onclick="editPost(${post.id})"><i class="fas fa-edit"></i> Edit</button>
            <button class="btn btn-danger" onclick="deletePost(${post.id})"><i class="fas fa-trash"></i> Delete</button>
          ` : ''}
          <button class="btn btn-outline" onclick="showQR('post', ${post.id}, '${encodeURIComponent(post.title || 'Post')}')"><i class="fas fa-qrcode"></i> QR</button>
          <button class="btn btn-outline" onclick="sharePost(${post.id})"><i class="fas fa-share-alt"></i> Share</button>
          <button class="btn btn-outline" onclick="viewHistory(${post.id})"><i class="fas fa-history"></i> History</button>
        </div>
      </div>
    `;
  }
  
  postsFeed.innerHTML = html;
  
  // Load comments and reactions for each post
  for (const post of posts) {
    loadComments(post.id);
    loadReactions(post.id);
  }
}

function renderMedia(post) {
  const mediaType = post.media_type || '';
  const mediaData = post.media_data || '';
  
  if (mediaType.includes('image') || mediaType === 'image') {
    return `<img src="${mediaData}" alt="Image" loading="lazy" style="max-width:100%;border-radius:16px;margin:0.3rem 0;">`;
  } else if (mediaType.includes('gif') || mediaType === 'gif') {
    return `<img src="${mediaData}" alt="GIF" loading="lazy" style="max-width:100%;border-radius:16px;margin:0.3rem 0;">`;
  } else if (mediaType.includes('spotify') || mediaType === 'spotify') {
    const match = mediaData.match(/spotify\.com\/(track|playlist|episode)\/([a-zA-Z0-9]+)/);
    if (match) {
      return `<iframe src="https://open.spotify.com/embed/${match[1]}/${match[2]}" allow="encrypted-media" style="width:100%;height:80px;border-radius:16px;border:none;"></iframe>`;
    }
    return `<a href="${mediaData}" target="_blank">${mediaData}</a>`;
  }
  return '';
}

function renderReactionsPlaceholder() {
  return '<span style="font-size:0.8rem;opacity:0.5;">Loading reactions...</span>';
}

// ---------- REACTIONS ----------
const REACTION_EMOJIS = {
  like: '👍',
  heart: '❤️',
  funny: '😂',
  wow: '😮',
  sad: '😢'
};

async function toggleReaction(postId, type) {
  if (!currentUser) { showAuthModal(); return; }
  
  try {
    const { data: existing } = await supabase
      .from('post_reactions')
      .select('id')
      .eq('post_id', postId)
      .eq('user_id', currentUser.id)
      .eq('reaction_type', type)
      .maybeSingle();
    
    if (existing) {
      await supabase.from('post_reactions').delete().eq('id', existing.id);
    } else {
      await supabase.from('post_reactions').insert([{
        post_id: postId,
        user_id: currentUser.id,
        reaction_type: type
      }]);
    }
    
    loadReactions(postId);
  } catch (error) {
    console.error('Error toggling reaction:', error);
  }
}

async function loadReactions(postId) {
  try {
    const { data, error } = await supabase
      .from('post_reactions')
      .select('reaction_type, user_id')
      .eq('post_id', postId);
    
    if (error) throw error;
    
    const container = document.getElementById(`reactions-${postId}`);
    if (!container) return;
    
    const counts = {};
    data.forEach(r => { counts[r.reaction_type] = (counts[r.reaction_type] || 0) + 1; });
    
    const userReactions = data
      .filter(r => currentUser && r.user_id === currentUser.id)
      .map(r => r.reaction_type);
    
    container.innerHTML = Object.entries(REACTION_EMOJIS).map(([key, emoji]) => `
      <button class="reaction-btn ${userReactions.includes(key) ? 'active' : ''}" onclick="toggleReaction(${postId}, '${key}')">
        ${emoji} <span class="reaction-count">${counts[key] || 0}</span>
      </button>
    `).join('');
  } catch (error) {
    console.error('Error loading reactions:', error);
  }
}

// ---------- COMMENTS ----------
async function addComment(postId) {
  if (!currentUser) { showAuthModal(); return; }
  
  const input = document.getElementById(`commentInput-${postId}`);
  const content = input.value.trim();
  if (!content) return;
  
  try {
    const { error } = await supabase
      .from('comments')
      .insert([{
        post_id: postId,
        user_id: currentUser.id,
        content: content
      }]);
    
    if (error) throw error;
    input.value = '';
    loadComments(postId);
  } catch (error) {
    alert('Error adding comment: ' + error.message);
  }
}

async function deleteComment(commentId, postId) {
  if (!confirm('Delete this comment?')) return;
  
  try {
    await supabase.from('comments').delete().eq('id', commentId);
    loadComments(postId);
  } catch (error) {
    alert('Error deleting comment: ' + error.message);
  }
}

async function loadComments(postId) {
  try {
    const { data, error } = await supabase
      .from('comments')
      .select(`
        *,
        users!comments_user_id_fkey (id, username, avatar_url)
      `)
      .eq('post_id', postId)
      .order('created_at', { ascending: true });
    
    if (error) throw error;
    
    const container = document.getElementById(`commentsList-${postId}`);
    if (!container) return;
    
    if (!data || data.length === 0) {
      container.innerHTML = '<div style="font-size:0.8rem;opacity:0.4;padding:0.5rem 0;">No comments yet</div>';
      return;
    }
    
    container.innerHTML = data.map(comment => `
      <div class="comment-item">
        <img class="comment-avatar" src="${comment.users?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(comment.users?.username || 'User')}&background=3b82f6&color=fff&size=64`}" alt="${comment.users?.username}" onclick="showProfile(${comment.user_id})">
        <div class="comment-body">
          <div class="comment-author" onclick="showProfile(${comment.user_id})">${comment.users?.username || 'Unknown'}</div>
          <div class="comment-text">${comment.content}</div>
          <div class="comment-time">${new Date(comment.created_at).toLocaleString()}</div>
          ${currentUser && (comment.user_id === currentUser.id) ? `
            <div class="comment-actions">
              <button class="btn btn-danger btn-sm" onclick="deleteComment(${comment.id}, ${postId})"><i class="fas fa-trash"></i></button>
            </div>
          ` : ''}
        </div>
      </div>
    `).join('');
  } catch (error) {
    console.error('Error loading comments:', error);
  }
}

// ---------- FOLLOW/UNFOLLOW ----------
async function toggleFollow(userId) {
  if (!currentUser) { showAuthModal(); return; }
  if (userId === currentUser.id) return;
  
  try {
    const { data: existing } = await supabase
      .from('followers')
      .select('id')
      .eq('follower_id', currentUser.id)
      .eq('following_id', userId)
      .maybeSingle();
    
    if (existing) {
      await supabase.from('followers').delete().eq('id', existing.id);
    } else {
      await supabase.from('followers').insert([{
        follower_id: currentUser.id,
        following_id: userId
      }]);
    }
    
    // Refresh profile if open
    if (currentProfileUserId) {
      await showProfile(currentProfileUserId);
    }
    await loadSuggestions();
    filterPosts();
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

async function isFollowing(userId) {
  if (!currentUser || userId === currentUser.id) return false;
  try {
    const { data } = await supabase
      .from('followers')
      .select('id')
      .eq('follower_id', currentUser.id)
      .eq('following_id', userId)
      .maybeSingle();
    return !!data;
  } catch { return false; }
}

// ---------- SUGGESTIONS (Who to follow) ----------
async function loadSuggestions() {
  if (!currentUser) {
    suggestionsBox.style.display = 'none';
    return;
  }
  
  try {
    // Get users current user is following
    const { data: following } = await supabase
      .from('followers')
      .select('following_id')
      .eq('follower_id', currentUser.id);
    
    const followingIds = following?.map(f => f.following_id) || [];
    
    // Suggest users not followed, excluding self
    const suggestions = allUsers
      .filter(u => u.id !== currentUser.id && !followingIds.includes(u.id))
      .slice(0, 5);
    
    if (suggestions.length === 0) {
      suggestionsBox.style.display = 'none';
      return;
    }
    
    suggestionsBox.style.display = 'block';
    suggestionsList.innerHTML = suggestions.map(u => `
      <div class="suggestion-item">
        <div class="suggestion-user" onclick="showProfile(${u.id})">
          <img class="suggestion-avatar" src="${u.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.username)}&background=3b82f6&color=fff&size=64`}" alt="${u.username}">
          <span class="suggestion-username">${u.username}</span>
        </div>
        <button class="btn btn-follow btn-sm" onclick="toggleFollow(${u.id})"><i class="fas fa-user-plus"></i> Follow</button>
      </div>
    `).join('');
  } catch (error) {
    console.error('Error loading suggestions:', error);
  }
}

// ---------- PROFILE ----------
userDisplay.addEventListener('click', () => showProfile(currentUser?.id));

async function showProfile(userId) {
  if (!userId) return;
  currentProfileUserId = userId;
  
  try {
    const { data: user, error } = await supabase
      .from('users')
      .select('*')
      .eq('id', userId)
      .single();
    
    if (error) throw error;
    
    profileAvatar.src = user.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=3b82f6&color=fff&size=128`;
    profileUsername.textContent = user.username;
    profileBio.textContent = user.bio || 'No bio yet';
    
    // Get post count
    const { count: postCount } = await supabase
      .from('posts')
      .select('id', { count: 'exact' })
      .eq('author_id', userId);
    profilePostCount.textContent = postCount || 0;
    
    // Get followers count
    const { count: followersCount } = await supabase
      .from('followers')
      .select('id', { count: 'exact' })
      .eq('following_id', userId);
    profileFollowersCount.textContent = followersCount || 0;
    
    // Get following count
    const { count: followingCount } = await supabase
      .from('followers')
      .select('id', { count: 'exact' })
      .eq('follower_id', userId);
    profileFollowingCount.textContent = followingCount || 0;
    
    // Follow button
    const isOwn = currentUser && currentUser.id === userId;
    const isFollow = await isFollowing(userId);
    
    if (isOwn) {
      profileFollowBtn.innerHTML = '';
    } else {
      profileFollowBtn.innerHTML = `
        <button class="btn ${isFollow ? 'btn-unfollow' : 'btn-follow'}" onclick="toggleFollow(${userId})">
          <i class="fas ${isFollow ? 'fa-user-minus' : 'fa-user-plus'}"></i>
          ${isFollow ? 'Unfollow' : 'Follow'}
        </button>
      `;
    }
    
    profileEditBtn.style.display = isOwn ? 'inline-flex' : 'none';
    
    profileModal.classList.add('show');
  } catch (error) {
    alert('Error loading profile: ' + error.message);
  }
}

// Click on post count to filter
function filterByUser(userId) {
  profileModal.classList.remove('show');
  // Filter by this user
  const filtered = allPosts.filter(p => p.author_id === userId);
  renderPosts(filtered);
  // Also switch feed nav to show we're filtering
  feedNavBtns.forEach(b => b.classList.remove('active'));
  document.querySelector('.feed-nav-btn[data-filter="global"]')?.classList.add('active');
  currentFilter = 'global';
}

closeProfileModal.addEventListener('click', () => profileModal.classList.remove('show'));
profileModal.addEventListener('click', (e) => {
  if (e.target === profileModal) profileModal.classList.remove('show');
});

profileQRBtn.addEventListener('click', () => {
  if (currentProfileUserId) {
    const user = allUsers.find(u => u.id === currentProfileUserId);
    showQR('profile', currentProfileUserId, `${user?.username || 'User'}'s profile`);
    profileModal.classList.remove('show');
  }
});

profileEditBtn.addEventListener('click', () => {
  const newBio = prompt('Edit your bio:', currentUser?.bio || '');
  if (newBio !== null && currentUser) {
    supabase.from('users')
      .update({ bio: newBio })
      .eq('id', currentUser.id)
      .then(() => {
        currentUser.bio = newBio;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        showProfile(currentUser.id);
      });
  }
});

// ---------- POST OPERATIONS ----------
function editPost(postId) {
  const post = allPosts.find(p => p.id === postId);
  if (!post || post.author_id !== currentUser?.id) return;
  
  editingPostId = postId;
  postTitleInput.value = post.title || '';
  quill.root.innerHTML = post.content_html || '';
  createArea.classList.add('show');
  createArea.scrollIntoView({ behavior: 'smooth' });
  
  if (post.media_type) {
    const btn = document.querySelector(`.post-option-btn[data-type="${post.media_type}"]`);
    if (btn) btn.click();
  }
}

async function deletePost(postId) {
  const post = allPosts.find(p => p.id === postId);
  if (!post || post.author_id !== currentUser?.id) return;
  if (!confirm('Delete this post permanently?')) return;
  
  try {
    await supabase.from('posts').delete().eq('id', postId);
    await loadPosts();
  } catch (error) {
    alert('Error deleting post: ' + error.message);
  }
}

async function viewHistory(postId) {
  try {
    const { data, error } = await supabase
      .from('post_history')
      .select('*')
      .eq('post_id', postId)
      .order('changed_at', { ascending: false });
    
    if (error) throw error;
    
    if (!data || data.length === 0) {
      alert('No history available for this post.');
      return;
    }
    
    let msg = '📜 Post History:\n\n';
    data.forEach((h, i) => {
      msg += `Version ${data.length - i} (${new Date(h.changed_at).toLocaleString()}):\n`;
      msg += `${h.content.substring(0, 200)}${h.content.length > 200 ? '...' : ''}\n\n`;
    });
    alert(msg);
  } catch (error) {
    alert('Error loading history: ' + error.message);
  }
}

// ---------- CREATE POST ----------
createBtn.addEventListener('click', async () => {
  if (!currentUser) { showAuthModal(); return; }
  
  const title = postTitleInput.value.trim();
  const content = quill.root.innerHTML;
  const textContent = quill.getText().trim();
  
  if (!textContent && !uploadedFileDataURL && !spotifyInput.value.trim()) {
    alert('Please add some content to your post.');
    return;
  }
  
  let mediaData = '';
  let mediaType = selectedPostType;
  
  if (uploadedFileDataURL) {
    mediaData = uploadedFileDataURL;
    mediaType = selectedPostType.includes('gif') ? 'gif' : 'image';
  } else if (spotifyInput.value.trim()) {
    mediaData = spotifyInput.value.trim();
    mediaType = 'spotify';
  }
  
  const isPinned = selectedPostType === 'pinned';
  
  const postData = {
    title: title,
    content: textContent,
    content_html: content,
    author_id: currentUser.id,
    timestamp: new Date().toISOString(),
    media_data: mediaData,
    media_type: mediaType,
    is_pinned: isPinned
  };
  
  try {
    if (editingPostId) {
      const { error } = await supabase
        .from('posts')
        .update({ ...postData, updated_at: new Date().toISOString() })
        .eq('id', editingPostId)
        .eq('author_id', currentUser.id);
      
      if (error) throw error;
      
      await supabase.from('post_history').insert([{
        post_id: editingPostId,
        content: textContent,
        content_html: content
      }]);
      
      editingPostId = null;
    } else {
      const { error } = await supabase.from('posts').insert([postData]);
      if (error) throw error;
    }
    
    clearBtn.click();
    await loadPosts();
  } catch (error) {
    alert('Error saving post: ' + error.message);
  }
});

// ---------- POST TYPE SELECTION ----------
postOptionBtns.forEach(btn => {
  btn.addEventListener('click', function() {
    postOptionBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    selectedPostType = this.dataset.type;
    updatePostTypeUI(selectedPostType);
  });
});

function updatePostTypeUI(type) {
  fileUploadWrapper.style.display = 'none';
  spotifyWrapper.style.display = 'none';
  filePreview.classList.remove('show');
  uploadedFileDataURL = null;
  
  if (type === 'image' || type === 'text-image') {
    fileUploadWrapper.style.display = 'block';
    fileInput.accept = 'image/*';
  } else if (type === 'gif' || type === 'text-gif') {
    fileUploadWrapper.style.display = 'block';
    fileInput.accept = 'image/gif';
  } else if (type === 'spotify' || type === 'text-spotify') {
    spotifyWrapper.style.display = 'flex';
  }
}

fileInput.addEventListener('change', function(e) {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      uploadedFileDataURL = event.target.result;
      filePreview.src = event.target.result;
      filePreview.classList.add('show');
    };
    reader.readAsDataURL(file);
  }
});

clearBtn.addEventListener('click', () => {
  postTitleInput.value = '';
  quill.setText('');
  fileInput.value = '';
  filePreview.classList.remove('show');
  uploadedFileDataURL = null;
  spotifyInput.value = '';
  editingPostId = null;
});

// ---------- SHARING ----------
function sharePost(postId) {
  const post = allPosts.find(p => p.id === postId);
  if (!post) return;
  
  const url = window.location.href + `?post=${postId}`;
  const text = post.title || 'Check out this post!';
  
  if (navigator.share) {
    navigator.share({
      title: text,
      text: post.content?.substring(0, 100) || '',
      url: url
    }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => {
      alert('🔗 Link copied to clipboard! Share it with others.');
    }).catch(() => {
      prompt('Copy this link:', url);
    });
  }
}

// ---------- QR CODE ----------
function showQR(type, id, label) {
  const url = window.location.href + `?${type}=${id}`;
  currentQRData = { type, id, url, label };
  
  qrContainer.innerHTML = '';
  qrCodeInstance = new QRCode(qrContainer, {
    text: url,
    width: 200,
    height: 200,
    colorDark: '#ffffff',
    colorLight: '#0b0d10',
    correctLevel: QRCode.CorrectLevel.H
  });
  
  qrLabel.textContent = `Scan to view ${label || 'this'}`;
  qrModal.classList.add('show');
}

closeQRModal.addEventListener('click', () => qrModal.classList.remove('show'));
qrModal.addEventListener('click', (e) => {
  if (e.target === qrModal) qrModal.classList.remove('show');
});

downloadQRBtn.addEventListener('click', () => {
  const canvas = qrContainer.querySelector('canvas');
  if (canvas) {
    const link = document.createElement('a');
    link.download = `qr-${currentQRData?.type || 'code'}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
});
