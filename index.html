<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔐 Secret Files</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0d10;
      color: #f0f3f8;
      transition: background 0.3s, color 0.2s;
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.light {
      background: #f5f7fa;
      color: #1e2329;
    }
    body.blue {
      background: linear-gradient(145deg, #0a1f2e, #0b2b3f);
      color: #e3f0ff;
    }
    body.green {
      background: linear-gradient(145deg, #0f2a1a, #143f25);
      color: #daf5e8;
    }
    body.rose {
      background: linear-gradient(145deg, #2f1a2b, #4a243d);
      color: #fae2f0;
    }
    body.amber {
      background: linear-gradient(145deg, #2f2413, #4d3a1a);
      color: #faf0d6;
    }

    .app-container {
      max-width: 820px;
      width: 100%;
      background: rgba(20, 24, 30, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 42px;
      padding: 1.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      transition: background 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }
    body.light .app-container {
      background: rgba(240, 244, 250, 0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem 0.5rem;
      margin-bottom: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo i {
      color: #ffb347;
      text-shadow: 0 0 10px #ff9f2e80;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
    }

    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 100px;
      color: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.2s ease;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .btn i { font-size: 1rem; }
    .btn-primary {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 12px #3b82f640;
      border: none;
    }
    .btn-primary:hover { background: #2563eb; transform: scale(0.97); }
    .btn-danger {
      background: #e5484d;
      color: white;
    }
    .btn-danger:hover { background: #c73b3f; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.06); }
    .btn-success {
      background: #22c55e;
      color: white;
    }
    .btn-success:hover { background: #16a34a; }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }
    .status-badge.synced { color: #22c55e; background: rgba(34, 197, 94, 0.2); }
    .status-badge.error { color: #ef4444; background: rgba(239, 68, 68, 0.2); }
    .status-badge.offline { color: #f59e0b; background: rgba(245, 158, 11, 0.2); }

    #passwordOverlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1.5rem;
      transition: opacity 0.3s;
    }
    #passwordOverlay.hidden {
      display: none;
    }
    .password-card {
      background: rgba(25, 30, 38, 0.9);
      padding: 2.5rem 2.2rem;
      border-radius: 48px;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      text-align: center;
    }
    .password-card h2 {
      margin-bottom: 1.5rem;
      font-weight: 600;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      align-items: center;
    }
    .password-card input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      outline: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }
    .password-card input:focus {
      outline: 2px solid #3b82f6;
    }
    .password-card .btn {
      width: 100%;
      justify-content: center;
      font-size: 1.1rem;
      padding: 0.8rem;
    }
    .wrong-pass {
      color: #f87171;
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }

    .theme-selector {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .theme-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: 0.2s;
    }
    .theme-dot:hover { transform: scale(1.1); }
    .theme-dot.active { border-color: white; box-shadow: 0 0 12px #ffffff70; }

    .posts-section {
      margin-top: 1.8rem;
    }
    .post-item {
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #3b82f6;
      transition: 0.2s;
      word-break: break-word;
    }
    body.light .post-item {
      background: rgba(255, 255, 255, 0.5);
      border-left-color: #2563eb;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem 0.8rem;
      margin-bottom: 0.5rem;
    }
    .post-content {
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0.5rem 0 0.8rem 0;
      white-space: pre-wrap;
    }
    .post-content img, .post-content iframe {
      max-width: 100%;
      border-radius: 20px;
      margin: 0.5rem 0;
    }
    .post-content iframe {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 20px;
    }
    .post-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .post-actions .btn {
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
    }
    .post-timestamp {
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 0.4rem;
    }

    .create-post-area {
      background: rgba(0,0,0,0.15);
      border-radius: 32px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 2rem;
      border: 1px dashed rgba(255,255,255,0.08);
    }
    .create-post-area textarea {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 24px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 70px;
      outline: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
      font-family: inherit;
    }
    .create-post-area textarea:focus {
      outline: 2px solid #3b82f6;
    }
    .create-post-area .btn {
      margin-top: 0.8rem;
    }
    .media-hint {
      font-size: 0.8rem;
      opacity: 0.6;
      margin: 0.4rem 0 0.2rem;
    }

    @media (max-width: 600px) {
      .app-container { padding: 1.2rem 1rem; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .logo { font-size: 1.6rem; justify-content: center; }
      .toolbar-actions { justify-content: center; }
      .post-item { padding: 1.2rem; }
    }
    @media (max-width: 420px) {
      .password-card { padding: 2rem 1.2rem; }
      .btn { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
    }

    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }
    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: auto;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- PASSWORD OVERLAY -->
  <div id="passwordOverlay">
    <div class="password-card">
      <h2><i class="fas fa-lock"></i> Secret Files</h2>
      <input type="password" id="passwordInput" placeholder="Enter password" autofocus>
      <button class="btn btn-primary" id="unlockBtn"><i class="fas fa-key"></i> Unlock</button>
      <div id="wrongPassMsg" class="wrong-pass"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-container" id="appContainer">
    <div class="top-bar">
      <div class="logo"><i class="fas fa-folder-open"></i> Secret<span style="font-weight:400;">Files</span></div>
      <div class="toolbar-actions">
        <span id="syncStatus" class="status-badge"><i class="fas fa-sync fa-spin"></i> Connecting</span>
        <div class="theme-selector">
          <span class="theme-dot active" data-theme="dark" style="background:#0b0d10;"></span>
          <span class="theme-dot" data-theme="light" style="background:#f0f3f8; border-color:#aaa;"></span>
          <span class="theme-dot" data-theme="blue" style="background:#0b2b3f;"></span>
          <span class="theme-dot" data-theme="green" style="background:#143f25;"></span>
          <span class="theme-dot" data-theme="rose" style="background:#4a243d;"></span>
          <span class="theme-dot" data-theme="amber" style="background:#4d3a1a;"></span>
        </div>
        <button class="btn btn-outline" id="lockBtn"><i class="fas fa-sign-out-alt"></i> Lock</button>
      </div>
    </div>

    <!-- Create Post -->
    <div id="createPostArea" class="create-post-area" style="display: none;">
      <h4 style="margin-bottom:0.5rem;"><i class="fas fa-pen-fancy"></i> New secret</h4>
      <textarea id="postContentInput" placeholder="Write something… embed image, GIF, Spotify link…"></textarea>
      <div class="media-hint"><i class="fas fa-info-circle"></i> Paste image URL, Spotify track link, or GIF</div>
      <button class="btn btn-primary" id="createPostBtn"><i class="fas fa-plus-circle"></i> Create Post</button>
    </div>

    <!-- Posts feed -->
    <div class="posts-section" id="postsFeed">
      <div style="text-align:center;padding:2rem;opacity:0.5;">
        <div class="loading-spinner"></div>
        <p style="margin-top:0.5rem;">Loading posts from Supabase...</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- CONFIG ----------
      const OWNER_PASSWORD = 'secret2026';
      let isOwner = false;
      let posts = [];

      // 🔥 SUPABASE CONFIG - REPLACE WITH YOUR CREDENTIALS
      const SUPABASE_URL = 'https://pdrfhjbehihehbadoaty.supabase.co';  // ← Your Supabase URL
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkcmZoamJlaGloZWhiYWRvYXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzgyNTEsImV4cCI6MjA5ODg1NDI1MX0.j541e7W56nVCESK_nsVUsGjAv2mOHGb27wwACJZKlBE';  // ← Your public anon key

      // Initialize Supabase
      const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

      // DOM refs
      const overlay = document.getElementById('passwordOverlay');
      const passInput = document.getElementById('passwordInput');
      const unlockBtn = document.getElementById('unlockBtn');
      const wrongMsg = document.getElementById('wrongPassMsg');
      const lockBtn = document.getElementById('lockBtn');
      const postsFeed = document.getElementById('postsFeed');
      const createArea = document.getElementById('createPostArea');
      const contentInput = document.getElementById('postContentInput');
      const createBtn = document.getElementById('createPostBtn');
      const themeDots = document.querySelectorAll('.theme-dot');
      const syncStatus = document.getElementById('syncStatus');

      // ---------- SUPABASE CRUD OPERATIONS ----------
      
      // Fetch all posts
      async function fetchPosts() {
        try {
          updateStatus('Loading');
          
          const { data, error } = await supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;
          
          posts = data || [];
          updateStatus('Synced');
          
          // Backup to localStorage
          localStorage.setItem('secret_posts_backup', JSON.stringify(posts));
          
          return posts;
        } catch (error) {
          console.error('Error fetching posts:', error);
          updateStatus('Error');
          
          // Fallback to localStorage
          const localData = localStorage.getItem('secret_posts_backup');
          if (localData) {
            posts = JSON.parse(localData);
            updateStatus('Offline');
            return posts;
          }
          return [];
        }
      }

      // Create a new post
      async function createPost(content, timestamp) {
        try {
          updateStatus('Saving');
          
          const { data, error } = await supabase
            .from('posts')
            .insert([
              { 
                content: content,
                timestamp: timestamp,
                created_at: new Date().toISOString()
              }
            ])
            .select();

          if (error) throw error;
          
          updateStatus('Synced');
          return data[0];
        } catch (error) {
          console.error('Error creating post:', error);
          updateStatus('Error');
          alert('⚠️ Could not save to Supabase. Please try again.');
          return null;
        }
      }

      // Update a post
      async function updatePost(id, content, timestamp) {
        try {
          updateStatus('Saving');
          
          const { data, error } = await supabase
            .from('posts')
            .update({ 
              content: content,
              timestamp: timestamp,
              updated_at: new Date().toISOString()
            })
            .eq('id', id)
            .select();

          if (error) throw error;
          
          updateStatus('Synced');
          return data[0];
        } catch (error) {
          console.error('Error updating post:', error);
          updateStatus('Error');
          alert('⚠️ Could not update post.');
          return null;
        }
      }

      // Delete a post
      async function deletePost(id) {
        try {
          updateStatus('Saving');
          
          const { error } = await supabase
            .from('posts')
            .delete()
            .eq('id', id);

          if (error) throw error;
          
          updateStatus('Synced');
          return true;
        } catch (error) {
          console.error('Error deleting post:', error);
          updateStatus('Error');
          alert('⚠️ Could not delete post.');
          return false;
        }
      }

      // ---------- RENDER ----------
      function renderPosts() {
        if (!postsFeed) return;
        
        if (posts.length === 0) {
          postsFeed.innerHTML = `
            <div style="text-align:center;padding:2rem;opacity:0.5;">
              <i class="fas fa-inbox fa-2x"></i>
              <p style="margin-top:0.5rem;">No secrets yet. Be the first to create one!</p>
            </div>
          `;
          return;
        }

        let html = '';
        posts.forEach((post, index) => {
          const contentWithMedia = formatContent(post.content);
          const postId = post.id;
          
          html += `
            <div class="post-item" data-id="${postId}">
              <div class="post-header">
                <span style="opacity:0.6;font-size:0.8rem;">
                  <i class="far fa-file-alt"></i> #${index+1}
                </span>
                <span style="font-size:0.7rem;opacity:0.4;">
                  ${new Date(post.timestamp).toLocaleString()}
                </span>
              </div>
              <div class="post-content">${contentWithMedia}</div>
              ${isOwner ? `
                <div class="post-actions">
                  <button class="btn btn-outline editPostBtn" data-id="${postId}">
                    <i class="fas fa-edit"></i> Edit
                  </button>
                  <button class="btn btn-danger deletePostBtn" data-id="${postId}">
                    <i class="fas fa-trash"></i> Delete
                  </button>
                </div>
              ` : ''}
              <div class="post-timestamp">${new Date(post.timestamp).toLocaleDateString()}</div>
            </div>
          `;
        });
        
        postsFeed.innerHTML = html;

        // Attach event listeners for edit/delete (only if owner)
        if (isOwner) {
          document.querySelectorAll('.editPostBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const id = parseInt(btn.dataset.id);
              const post = posts.find(p => p.id === id);
              if (post) {
                const newContent = prompt('Edit your secret:', post.content);
                if (newContent !== null && newContent.trim() !== '') {
                  const updated = await updatePost(id, newContent.trim(), new Date().toISOString());
                  if (updated) {
                    await loadPosts();
                  }
                }
              }
            });
          });

          document.querySelectorAll('.deletePostBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const id = parseInt(btn.dataset.id);
              if (confirm('Permanently delete this secret?')) {
                const success = await deletePost(id);
                if (success) {
                  await loadPosts();
                }
              }
            });
          });
        }
      }

      // ---------- FORMAT CONTENT ----------
      function formatContent(text) {
        let result = '';
        const lines = text.split('\n');
        for (let line of lines) {
          let trimmed = line.trim();
          
          // Check for image URL
          if (trimmed.match(/\.(jpeg|jpg|gif|png|webp|bmp)(\?.*)?$/i)) {
            result += `<img src="${trimmed}" alt="media" loading="lazy" style="max-width:100%;max-height:300px;border-radius:16px;margin:6px 0;" onerror="this.style.display='none'">`;
          } 
          // Check for Spotify URL
          else if (trimmed.includes('spotify.com/track/') || trimmed.includes('spotify.com/playlist/') || trimmed.includes('spotify.com/episode/')) {
            let match = trimmed.match(/spotify\.com\/(track|playlist|episode)\/([a-zA-Z0-9]+)/);
            if (match) {
              const type = match[1];
              const id = match[2];
              result += `<iframe src="https://open.spotify.com/embed/${type}/${id}" style="width:100%;height:80px;border-radius:20px;" allow="encrypted-media"></iframe>`;
            } else {
              result += `<span>${trimmed}</span>`;
            }
          } 
          // Check for YouTube URL
          else if (trimmed.includes('youtube.com/watch') || trimmed.includes('youtu.be/')) {
            let match = trimmed.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            if (match) {
              result += `<iframe src="https://www.youtube.com/embed/${match[1]}" style="width:100%;height:200px;border-radius:20px;margin:6px 0;" allow="encrypted-media" allowfullscreen></iframe>`;
            } else {
              result += `<span>${trimmed}</span>`;
            }
          }
          else {
            result += `<span>${trimmed}</span>`;
          }
          result += '<br>';
        }
        return result || text;
      }

      // ---------- STATUS UPDATES ----------
      function updateStatus(status) {
        if (!syncStatus) return;
        
        const icon = status === 'Loading' ? 'fa-sync fa-spin' :
                    status === 'Saving' ? 'fa-upload fa-spin' :
                    status === 'Synced' ? 'fa-check-circle' :
                    status === 'Error' ? 'fa-exclamation-circle' :
                    status === 'Offline' ? 'fa-wifi' : 'fa-sync';
                    
        const className = status === 'Synced' ? 'synced' :
                         status === 'Error' ? 'error' :
                         status === 'Offline' ? 'offline' : '';
                         
        syncStatus.className = `status-badge ${className}`;
        syncStatus.innerHTML = `<i class="fas ${icon}"></i> ${status}`;
      }

      // ---------- PASSWORD ----------
      function unlock(password) {
        if (password === OWNER_PASSWORD) {
          isOwner = true;
          overlay.classList.add('hidden');
          createArea.style.display = 'block';
          wrongMsg.textContent = '';
          passInput.value = '';
          loadPosts();
          return true;
        } else {
          wrongMsg.textContent = '❌ Wrong password. Try again.';
          passInput.value = '';
          passInput.focus();
          return false;
        }
      }

      function lock() {
        isOwner = false;
        overlay.classList.remove('hidden');
        createArea.style.display = 'none';
        passInput.value = '';
        wrongMsg.textContent = '';
        renderPosts();
      }

      // ---------- LOAD POSTS ----------
      async function loadPosts() {
        await fetchPosts();
        renderPosts();
      }

      // ---------- EVENTS ----------
      unlockBtn.addEventListener('click', () => unlock(passInput.value));
      passInput.addEventListener('keydown', (e) => { 
        if (e.key === 'Enter') unlock(passInput.value); 
      });
      lockBtn.addEventListener('click', lock);

      createBtn.addEventListener('click', async () => {
        if (!isOwner) return alert('You are not the owner.');
        const content = contentInput.value.trim();
        if (content === '') return alert('Write something first.');
        
        const newPost = await createPost(content, new Date().toISOString());
        if (newPost) {
          await loadPosts();
          contentInput.value = '';
        }
      });

      // Theme switching
      themeDots.forEach(dot => {
        dot.addEventListener('click', function() {
          const theme = this.dataset.theme;
          document.body.className = theme;
          themeDots.forEach(d => d.classList.remove('active'));
          this.classList.add('active');
          localStorage.setItem('selected_theme', theme);
        });
      });

      // Restore theme
      const savedTheme = localStorage.getItem('selected_theme') || 'dark';
      document.body.className = savedTheme;
      themeDots.forEach(dot => {
        if (dot.dataset.theme === savedTheme) {
          dot.classList.add('active');
        }
      });

      // Block context menu & devtools
      document.addEventListener('contextmenu', (e) => { 
        e.preventDefault(); 
        return false; 
      });
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
            (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
          return false;
        }
        if (e.ctrlKey && e.key === 'p') { 
          e.preventDefault(); 
          return false; 
        }
      });

      // ---------- INIT ----------
      overlay.classList.remove('hidden');
      createArea.style.display = 'none';
      setTimeout(() => passInput.focus(), 200);
      
      // Try to load from cache first
      const localBackup = localStorage.getItem('secret_posts_backup');
      if (localBackup) {
        try {
          posts = JSON.parse(localBackup);
          renderPosts();
        } catch(e) {}
      }
    })();
  </script>
</body>
</html>
