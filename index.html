<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔐 Secret Social</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0d10;
      color: #f0f3f8;
      transition: background 0.3s, color 0.2s;
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    body.light { background: #f5f7fa; color: #1e2329; }
    body.blue { background: linear-gradient(145deg, #0a1f2e, #0b2b3f); color: #e3f0ff; }
    body.green { background: linear-gradient(145deg, #0f2a1a, #143f25); color: #daf5e8; }
    body.rose { background: linear-gradient(145deg, #2f1a2b, #4a243d); color: #fae2f0; }
    body.amber { background: linear-gradient(145deg, #2f2413, #4d3a1a); color: #faf0d6; }
    
    .app-container {
      max-width: 860px;
      width: 100%;
      background: rgba(20, 24, 30, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 42px;
      padding: 1.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.04);
    }
    body.light .app-container {
      background: rgba(240, 244, 250, 0.75);
      border: 1px solid rgba(0,0,0,0.04);
    }
    
    /* Auth Modal */
    #authModal {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.92);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 1.5rem;
    }
    #authModal.show { display: flex; }
    .auth-card {
      background: rgba(25, 30, 38, 0.95);
      padding: 2.5rem;
      border-radius: 48px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .auth-card h2 { text-align: center; margin-bottom: 1.5rem; }
    .auth-card input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 0.8rem;
      outline: 1px solid rgba(255,255,255,0.1);
    }
    .auth-card input:focus { outline: 2px solid #3b82f6; }
    .auth-card .btn { width: 100%; justify-content: center; padding: 0.8rem; }
    .auth-card .switch-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.6;
      cursor: pointer;
    }
    .auth-card .switch-link:hover { opacity: 1; }
    .auth-error { color: #f87171; margin-top: 0.5rem; font-size: 0.85rem; text-align: center; }
    
    /* Top Bar */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; font-size: 1.6rem; font-weight: 700; }
    .logo i { color: #ffb347; }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #3b82f6;
      cursor: pointer;
    }
    
    .btn {
      background: rgba(255,255,255,0.06);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      color: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .btn-primary { background: #3b82f6; color: white; border: none; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #e5484d; color: white; }
    .btn-danger:hover { background: #c73b3f; }
    .btn-gold { background: #f59e0b; color: #1e2329; }
    .btn-gold:hover { background: #d97706; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); }
    .btn-outline:hover { background: rgba(255,255,255,0.06); }
    .btn-sm { padding: 0.2rem 0.7rem; font-size: 0.75rem; }
    .btn-follow { background: #3b82f6; color: white; }
    .btn-follow:hover { background: #2563eb; }
    .btn-unfollow { background: #6b7280; color: white; }
    .btn-unfollow:hover { background: #4b5563; }
    
    /* Search */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      outline: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
      min-width: 150px;
    }
    .search-bar input:focus { outline: 2px solid #3b82f6; }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
    
    .search-results {
      background: rgba(0,0,0,0.15);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .search-results.show { display: block; }
    .search-result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      flex: 1;
    }
    .search-result-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .search-result-username { font-size: 0.85rem; font-weight: 500; }
    
    /* Feed Nav */
    .feed-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .feed-nav-btn {
      background: none;
      border: none;
      color: inherit;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      opacity: 0.5;
      transition: 0.2s;
    }
    .feed-nav-btn:hover { opacity: 0.8; background: rgba(255,255,255,0.05); }
    .feed-nav-btn.active { opacity: 1; background: rgba(59,130,246,0.2); color: #3b82f6; }
    
    /* Create Post Toggle */
    .create-post-toggle {
      width: 100%;
      padding: 0.8rem;
      border-radius: 32px;
      background: rgba(59,130,246,0.1);
      border: 2px dashed rgba(59,130,246,0.3);
      color: inherit;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.2s;
      margin-bottom: 1.5rem;
    }
    .create-post-toggle:hover { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
    
    /* Create Post Area */
    .create-post-area {
      background: rgba(0,0,0,0.15);
      border-radius: 32px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
    }
    .create-post-area.show { display: block; }
    
    #quillEditor {
      min-height: 150px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      color: inherit;
    }
    .ql-toolbar.ql-snow { border: none; background: rgba(255,255,255,0.05); border-radius: 16px 16px 0 0; padding: 0.5rem; }
    .ql-container.ql-snow { border: none; min-height: 120px; }
    .ql-editor { color: inherit; min-height: 100px; }
    .ql-editor.ql-blank::before { color: rgba(255,255,255,0.3); }
    .ql-toolbar.ql-snow .ql-stroke { stroke: currentColor; }
    .ql-toolbar.ql-snow .ql-fill { fill: currentColor; }
    
    .post-options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.5rem;
      margin: 0.8rem 0;
    }
    .post-option-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .post-option-btn.active { border-color: #3b82f6; background: rgba(59,130,246,0.2); }
    .post-option-btn:hover { border-color: #3b82f6; }
    
    .file-input-wrapper { margin: 0.5rem 0; }
    .file-input-wrapper input[type="file"] { display: none; }
    .file-preview { max-width: 200px; max-height: 150px; border-radius: 12px; display: none; margin: 0.5rem 0; }
    .file-preview.show { display: block; }
    
    .spotify-input-wrapper { display: flex; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
    .spotify-input-wrapper input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: inherit;
    }
    .spotify-input-wrapper input:focus { outline: 2px solid #3b82f6; }
    .create-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
    
    /* Post Items */
    .post-item {
      background: rgba(0,0,0,0.2);
      border-radius: 28px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #3b82f6;
      transition: 0.2s;
    }
    body.light .post-item { background: rgba(255,255,255,0.5); }
    .post-item.pinned { border-left-color: #f59e0b; }
    
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .post-author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .post-author:hover .post-author-name { text-decoration: underline; }
    .post-author-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .post-author-name { font-weight: 600; font-size: 0.9rem; }
    .post-title { font-size: 1.2rem; font-weight: 600; margin: 0.3rem 0; }
    .post-meta { font-size: 0.7rem; opacity: 0.5; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .post-content { font-size: 1rem; line-height: 1.7; margin: 0.5rem 0; }
    .post-content img { max-width: 100%; border-radius: 16px; margin: 0.3rem 0; }
    .post-content iframe { width: 100%; height: 80px; border-radius: 16px; border: none; }
    .pinned-badge { background: #f59e0b; color: #1e2329; padding: 0.1rem 0.6rem; border-radius: 20px; font-size: 0.6rem; font-weight: 700; }
    
    /* Reactions */
    .post-reactions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0; }
    .reaction-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .reaction-btn:hover { background: rgba(255,255,255,0.1); }
    .reaction-btn.active { background: rgba(59,130,246,0.3); }
    .reaction-count { font-size: 0.7rem; opacity: 0.6; cursor: pointer; }
    .reaction-count:hover { opacity: 1; text-decoration: underline; }
    
    /* Comments */
    .comments-section {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .comment-item {
      padding: 0.5rem 0;
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
    }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .comment-body { flex: 1; font-size: 0.9rem; }
    .comment-author { font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    .comment-author:hover { text-decoration: underline; }
    .comment-text { margin-top: 0.1rem; }
    .comment-time { font-size: 0.65rem; opacity: 0.4; }
    .comment-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }
    .comment-actions .btn { padding: 0.1rem 0.5rem; font-size: 0.65rem; }
    .comment-input-wrapper {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .comment-input-wrapper input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      outline: 1px solid rgba(255,255,255,0.05);
    }
    .comment-input-wrapper input:focus { outline: 2px solid #3b82f6; }
    
    .post-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .post-actions .btn { padding: 0.2rem 0.8rem; font-size: 0.75rem; }
    
    /* Modals */
    #qrModal, #settingsModal, #profileModal, #userListModal, #reactionUsersModal {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 1.5rem;
    }
    #qrModal.show, #settingsModal.show, #profileModal.show, #userListModal.show, #reactionUsersModal.show { display: flex; }
    
    .qr-card, .settings-card, .profile-card, .user-list-card, .reaction-users-card {
      background: rgba(25,30,38,0.95);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .qr-card .close-btn, .settings-card .close-btn, .profile-card .close-btn, 
    .user-list-card .close-btn, .reaction-users-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .qr-card .close-btn:hover, .settings-card .close-btn:hover, .profile-card .close-btn:hover,
    .user-list-card .close-btn:hover, .reaction-users-card .close-btn:hover {
      color: #fff;
      transform: rotate(90deg);
    }
    
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; margin: 0.5rem auto; }
    .profile-username { font-size: 1.3rem; font-weight: 600; text-align: center; }
    .profile-bio { opacity: 0.6; font-size: 0.9rem; margin: 0.5rem 0; text-align: center; }
    .profile-stats { display: flex; justify-content: center; gap: 2rem; margin: 1rem 0; }
    .profile-stat { text-align: center; cursor: pointer; }
    .profile-stat:hover .profile-stat-number { color: #3b82f6; }
    .profile-stat-number { font-size: 1.2rem; font-weight: 600; transition: 0.2s; }
    .profile-stat-label { font-size: 0.7rem; opacity: 0.5; }
    .profile-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    
    .settings-theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .settings-theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-theme-option:hover { border-color: rgba(255,255,255,0.2); }
    .settings-theme-option.active { border-color: #3b82f6; background: rgba(59,130,246,0.15); }
    .settings-theme-option .theme-preview { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }
    .settings-theme-option .theme-name { font-size: 0.7rem; opacity: 0.6; }
    .settings-theme-option.active .theme-name { opacity: 1; color: #3b82f6; }
    
    #qrContainer { display: flex; justify-content: center; margin: 1rem 0; }
    
    .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .empty-state { text-align: center; padding: 2rem; opacity: 0.5; }
    .empty-state i { font-size: 2rem; }
    .empty-state p { margin-top: 0.5rem; }
    
    .suggestions-box { background: rgba(0,0,0,0.15); border-radius: 20px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
    .suggestions-box h4 { margin-bottom: 0.8rem; opacity: 0.6; font-size: 0.9rem; }
    .suggestion-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-user { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .suggestion-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .suggestion-username { font-size: 0.85rem; font-weight: 500; }
    
    .user-list-items, .reaction-users-list { max-height: 300px; overflow-y: auto; margin-top: 1rem; }
    .user-list-item, .reaction-user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .user-list-item:last-child, .reaction-user-item:last-child { border-bottom: none; }
    .user-list-user, .reaction-user-item { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; flex: 1; }
    .user-list-avatar, .reaction-user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .user-list-username, .reaction-user-username { font-size: 0.85rem; font-weight: 500; }
    
    @media (max-width: 600px) {
      .app-container { padding: 1rem; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .logo { justify-content: center; }
      .user-info { justify-content: center; }
      .post-options-grid { grid-template-columns: repeat(2,1fr); }
      .settings-theme-grid { grid-template-columns: repeat(2,1fr); }
      .feed-nav { justify-content: center; }
      .profile-stats { gap: 1rem; }
      .search-bar { flex-direction: column; }
    }
    
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div id="authModal">
  <div class="auth-card">
    <h2 id="authTitle"><i class="fas fa-user"></i> Login</h2>
    <input type="text" id="authUsername" placeholder="Username">
    <input type="email" id="authEmail" placeholder="Email (for signup)">
    <input type="password" id="authPassword" placeholder="Password">
    <button class="btn btn-primary" id="authSubmitBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div class="switch-link" id="authSwitch">Don't have an account? Sign up</div>
    <div id="authError" class="auth-error"></div>
  </div>
</div>

<!-- QR MODAL -->
<div id="qrModal">
  <div class="qr-card">
    <button class="close-btn" id="closeQRModal"><i class="fas fa-times"></i></button>
    <h3><i class="fas fa-qrcode"></i> QR Code</h3>
    <div id="qrContainer"></div>
    <p style="font-size:0.8rem;opacity:0.6;margin-top:0.5rem;" id="qrLabel">Scan to view this</p>
    <button class="btn btn-outline" id="downloadQRBtn"><i class="fas fa-download"></i> Download</button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal">
  <div class="settings-card">
    <button class="close-btn" id="closeSettingsModal"><i class="fas fa-times"></i></button>
    <h3><i class="fas fa-palette"></i> Choose Theme</h3>
    <div class="settings-theme-grid" id="settingsThemeGrid">
      <div class="settings-theme-option active" data-theme="dark"><div class="theme-preview" style="background:#0b0d10;"></div><span class="theme-name">Dark</span></div>
      <div class="settings-theme-option" data-theme="light"><div class="theme-preview" style="background:#f5f7fa;border-color:#d1d5db;"></div><span class="theme-name">Light</span></div>

(function() {

  // ---------- STATE ----------
  let currentUser = null;

  const searchResultsList = $('searchResultsList');

  const settingsModal = $('settingsModal');
  const settingsBtn = $('settingsBtn');
  const closeSettingsModal = $('closeSettingsModal');
  const settingsThemeGrid = $('settingsThemeGrid');

  const qrModal = $('qrModal');
  const qrContainer = $('qrContainer');
  const qrLabel = $('qrLabel');
  const closeQRModal = $('closeQRModal');
  const downloadQRBtn = $('downloadQRBtn');

  const profileModal = $('profileModal');
  const closeProfileModal = $('closeProfileModal');
  const profileAvatar = $('profileAvatar');
  const profileUsername = $('profileUsername');
  const profileBio = $('profileBio');
  const profilePostCount = $('profilePostCount');
  const profileFollowersCount = $('profileFollowersCount');
  const profileFollowingCount = $('profileFollowingCount');
  const profileFollowBtn = $('profileFollowBtn');
  const profileQRBtn = $('profileQRBtn');
  const profileEditBtn = $('profileEditBtn');
  const syncStatus = $('syncStatus');
  const suggestionsBox = $('suggestionsBox');
  const suggestionsList = $('suggestionsList');

  const userListModal = $('userListModal');
  const closeUserListModal = $('closeUserListModal');
  const userListTitle = $('userListTitle');
  const userListItems = $('userListItems');

  const reactionUsersModal = $('reactionUsersModal');
  const closeReactionUsersModal = $('closeReactionUsersModal');
  const reactionUsersTitle = $('reactionUsersTitle');
  const reactionUsersList = $('reactionUsersList');

  // ---------- QUILL ----------
  function initQuill() {
    if (quill) return;
    quill = new Quill('#quillEditor', {
      theme: 'snow',
      placeholder: "What's on your mind?",
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline', 'strike'],
          ['blockquote', 'code-block'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          [{ 'color': [] }, { 'background': [] }],
          ['link', 'image', 'video'],
          ['clean']
        ]
      }
    });
  }
  initQuill();

  // ---------- CREATE POST TOGGLE ----------
  createPostToggle.addEventListener('click', function() {
    createArea.classList.toggle('show');
    createPostToggle.innerHTML = createArea.classList.contains('show') ? 
      '<i class="fas fa-times"></i> Close' : 
      '<i class="fas fa-pen-fancy"></i> Create a new post';
  });

  // ---------- AUTH ----------
  let isLoginMode = true;

  authSwitch.addEventListener('click', function() {
    isLoginMode = !isLoginMode;
    authTitle.innerHTML = isLoginMode ? '<i class="fas fa-user"></i> Login' : '<i class="fas fa-user-plus"></i> Sign Up';
    authSubmitBtn.innerHTML = isLoginMode ? '<i class="fas fa-sign-in-alt"></i> Login' : '<i class="fas fa-user-plus"></i> Sign Up';
    authSwitch.textContent = isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Login";
    authEmail.style.display = isLoginMode ? 'none' : 'block';
    authError.textContent = '';
  });

  authSubmitBtn.addEventListener('click', async function() {
    const username = authUsername.value.trim();
    const email = isLoginMode ? '' : authEmail.value.trim();
    const password = authPassword.value;
    
    if (!username || !password) { authError.textContent = 'Please fill in all fields.'; return; }
    if (!isLoginMode && !email) { authError.textContent = 'Email is required for signup.'; return; }
    
    authError.textContent = '';
    
    try {
      if (isLoginMode) {
        const { data, error } = await supabase
          .from('users')
          .select('*')
          .eq('username', username)
          .eq('password_hash', password)
          .single();
        
        if (error || !data) { throw new Error('Invalid username or password'); }
        
        currentUser = data;
        localStorage.setItem('currentUser', JSON.stringify(data));
        hideAuthModal();
        updateUI();
        await loadAllData();
      } else {
        const { data: existing } = await supabase
          .from('users')
          .select('id')
          .eq('username', username)
          .maybeSingle();
        
        if (existing) { throw new Error('Username already taken'); }
        
        const { data, error } = await supabase
          .from('users')
          .insert([{
            username: username,
            email: email,
            password_hash: password,
            avatar_url: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(username) + '&background=3b82f6&color=fff&size=128'
          }])
          .select()
          .single();
        
        if (error) throw new Error(error.message);
        
        currentUser = data;
        localStorage.setItem('currentUser', JSON.stringify(data));
        hideAuthModal();
        updateUI();
        await loadAllData();
      }
    } catch (error) {
      authError.textContent = error.message || 'Authentication failed';
    }
  });

  authBtn.addEventListener('click', function() { authModal.classList.add('show'); });
  logoutBtn.addEventListener('click', logout);

  function showAuthModal() {
    authModal.classList.add('show');
    authUsername.value = '';
    authPassword.value = '';
    authEmail.value = '';
    authError.textContent = '';
    setTimeout(function() { authUsername.focus(); }, 100);
  }

  function hideAuthModal() { authModal.classList.remove('show'); }

  authModal.addEventListener('click', function(e) {
    if (e.target === authModal) hideAuthModal();
  });

  authUsername.addEventListener('keydown', function(e) { if (e.key === 'Enter') authSubmitBtn.click(); });
  authPassword.addEventListener('keydown', function(e) { if (e.key === 'Enter') authSubmitBtn.click(); });

  function logout() {
    currentUser = null;
    localStorage.removeItem('currentUser');
    followingCache = [];
    updateUI();
    allPosts = [];
    renderPosts();
  }

  function updateUI() {
    if (currentUser) {
      authBtn.style.display = 'none';
      logoutBtn.style.display = 'inline-flex';
      userDisplay.style.display = 'flex';
      userAvatarDisplay.src = currentUser.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.username) + '&background=3b82f6&color=fff&size=128';
      userNameDisplay.textContent = currentUser.username;
      createPostToggle.style.display = 'flex';
    } else {
      authBtn.style.display = 'inline-flex';
      logoutBtn.style.display = 'none';
      userDisplay.style.display = 'none';
      createArea.classList.remove('show');
      createPostToggle.style.display = 'none';
    }
  }

  // ---------- FOLLOWING CACHE ----------
  function updateFollowingCache() {
    if (!currentUser) return;
    supabase.from('followers')
      .select('following_id')
      .eq('follower_id', currentUser.id)
      .then(function(result) {
        followingCache = (result.data || []).map(function(f) { return f.following_id; });
      });
  }

  // ---------- LOAD ALL DATA ----------
  async function loadAllData() {
    await loadUsers();
    await loadPosts();
    await loadSuggestions();
  }

  async function loadUsers() {
    try {
      const { data, error } = await supabase.from('users').select('*');
      if (error) throw error;
      allUsers = data || [];
    } catch (error) {
      console.error('Error loading users:', error);
    }
  }

  // ---------- SEARCH ----------
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const query = this.value.trim();
    
    if (query.length === 0) {
      searchResults.classList.remove('show');
      return;
    }
    
    if (query.length < 2) {
      searchResultsList.innerHTML = '<div style="padding:0.5rem;text-align:center;opacity:0.4;">Type at least 2 characters...</div>';
      searchResults.classList.add('show');
      return;
    }
    
    searchTimeout = setTimeout(function() {
      performSearch(query);
    }, 300);
  });

  searchBtn.addEventListener('click', function() {
    const query = searchInput.value.trim();
    if (query) performSearch(query);
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const query = this.value.trim();
      if (query) performSearch(query);
    }
  });

  function performSearch(query) {
    if (!query || query.length < 2) {
      searchResults.classList.remove('show');
      return;
    }
    
    const lowerQuery = query.toLowerCase();
    const results = allUsers.filter(function(u) {
      return u.username.toLowerCase().includes(lowerQuery) && u.id !== currentUser?.id;
    });
    
    if (results.length === 0) {
      searchResultsList.innerHTML = '<div style="padding:0.8rem;text-align:center;opacity:0.5;"><i class="fas fa-search"></i> No users found matching "' + query + '"</div>';
    } else {
      searchResultsList.innerHTML = results.map(function(u) {
        var avatar = u.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.username) + '&background=3b82f6&color=fff&size=64';
        var isFollow = currentUser ? followingCache.includes(u.id) : false;
        var highlighted = u.username.replace(new RegExp(query, 'gi'), function(match) {
          return '<strong style="color:#3b82f6;">' + match + '</strong>';
        });
        return '<div class="search-result-item">' +
          '<div class="search-result-user" onclick="showProfile(\'' + u.id + '\')">' +
          '<img class="search-result-avatar" src="' + avatar + '" alt="' + u.username + '">' +
          '<span class="search-result-username">' + highlighted + '</span>' +
          '</div>' +
          (currentUser && currentUser.id !== u.id ? '<button class="btn ' + (isFollow ? 'btn-unfollow' : 'btn-follow') + ' btn-sm" onclick="event.stopPropagation(); toggleFollow(\'' + u.id + '\')"><i class="fas ' + (isFollow ? 'fa-user-minus' : 'fa-user-plus') + '"></i></button>' : '') +
          '</div>';
      }).join('');
    }
    
    searchResults.classList.add('show');
  }

  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target) && e.target !== searchBtn) {
      searchResults.classList.remove('show');
    }
  });

  // ---------- TOGGLE FOLLOW ----------
  window.toggleFollow = async function(userId) {
    if (!currentUser) { showAuthModal(); return; }
    if (userId === currentUser.id) return;
    
    try {
      const { data: existing } = await supabase
        .from('followers')
        .select('id')
        .eq('follower_id', currentUser.id)
        .eq('following_id', userId)
        .maybeSingle();
      
      if (existing) {
        await supabase.from('followers').delete().eq('id', existing.id);
        followingCache = followingCache.filter(function(id) { return id !== userId; });
      } else {
        await supabase.from('followers').insert([{
          follower_id: currentUser.id,
          following_id: userId
        }]);
        followingCache.push(userId);
      }
      
      if (currentProfileUserId) {
        await showProfile(currentProfileUserId);
      }
      await loadSuggestions();
      filterPosts();
      if (searchResults.classList.contains('show')) {
        performSearch(searchInput.value.trim());
      }
    } catch (error) {
      alert('Error: ' + error.message);
    }
  };

  // ---------- PROFILE ----------
  function closeProfileModalHandler() {
    profileModal.classList.remove('show');
    filterPosts();
  }

  closeProfileModal.addEventListener('click', closeProfileModalHandler);
  profileModal.addEventListener('click', function(e) {
    if (e.target === profileModal) closeProfileModalHandler();
  });

  window.showProfile = async function(userId) {
    if (!userId) return;
    currentProfileUserId = userId;
    
    try {
      const { data: user, error } = await supabase
        .from('users')
        .select('*')
        .eq('id', userId)
        .single();
      
      if (error) throw error;
      
      profileAvatar.src = user.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.username) + '&background=3b82f6&color=fff&size=128';
      profileUsername.textContent = user.username;
      profileBio.textContent = user.bio || 'No bio yet';
      
      const { count: postCount } = await supabase
        .from('posts')
        .select('id', { count: 'exact' })
        .eq('author_id', userId);
      profilePostCount.textContent = postCount || 0;
      
      const { count: followersCount } = await supabase
        .from('followers')
        .select('id', { count: 'exact' })
        .eq('following_id', userId);
      profileFollowersCount.textContent = followersCount || 0;
      
      const { count: followingCount } = await supabase
        .from('followers')
        .select('id', { count: 'exact' })
        .eq('follower_id', userId);
      profileFollowingCount.textContent = followingCount || 0;
      
      const isOwn = currentUser && currentUser.id === userId;
      const isFollow = followingCache.includes(userId);
      
      if (isOwn) {
        profileFollowBtn.innerHTML = '';
      } else {
        profileFollowBtn.innerHTML = '<button class="btn ' + (isFollow ? 'btn-unfollow' : 'btn-follow') + '" onclick="toggleFollow(\'' + userId + '\')"><i class="fas ' + (isFollow ? 'fa-user-minus' : 'fa-user-plus') + '"></i> ' + (isFollow ? 'Unfollow' : 'Follow') + '</button>';
      }
      
      profileEditBtn.style.display = isOwn ? 'inline-flex' : 'none';
      
      profileModal.classList.add('show');
      
      // Filter posts by this user
      const userPosts = allPosts.filter(function(p) { return p.author_id === userId; });
      renderPosts(userPosts);
      
    } catch (error) {
      alert('Error loading profile: ' + error.message);
    }
  };

  window.filterByUser = function(userId) {
    profileModal.classList.remove('show');
    const filtered = allPosts.filter(function(p) { return p.author_id === userId; });
    renderPosts(filtered);
    feedNavBtns.forEach(function(b) { b.classList.remove('active'); });
    const globalBtn = document.querySelector('.feed-nav-btn[data-filter="global"]');
    if (globalBtn) globalBtn.classList.add('active');
    currentFilter = 'global';
  };

  profileQRBtn.addEventListener('click', function() {
    if (currentProfileUserId) {
      const user = allUsers.find(function(u) { return u.id === currentProfileUserId; });
      showQR('profile', currentProfileUserId, (user?.username || 'User') + "'s profile");
      profileModal.classList.remove('show');
    }
  });

  profileEditBtn.addEventListener('click', function() {
    const newBio = prompt('Edit your bio:', currentUser?.bio || '');
    if (newBio !== null && currentUser) {
      supabase.from('users')
        .update({ bio: newBio })
        .eq('id', currentUser.id)
        .then(function() {
          currentUser.bio = newBio;
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          showProfile(currentUser.id);
        });
    }
  });

  // ---------- USER LIST (Followers/Following) ----------
  window.showUserList = async function(type) {
    if (!currentProfileUserId) return;
    
    const title = type === 'followers' ? 'Followers' : 'Following';
    userListTitle.innerHTML = '<i class="fas fa-users"></i> ' + title;
    userListItems.innerHTML = '<div style="text-align:center;padding:1rem;opacity:0.5;">Loading...</div>';
    userListModal.classList.add('show');
    
    try {
      let query = supabase
        .from('followers')
        .select(`
          id,
          users!followers_follower_id_fkey (id, username, avatar_url),
          users!followers_following_id_fkey (id, username, avatar_url)
        `);
      
      if (type === 'followers') {
        query = query.eq('following_id', currentProfileUserId);
      } else {
        query = query.eq('follower_id', currentProfileUserId);
      }
      
      const { data, error } = await query;
      if (error) throw error;
      
      if (!data || data.length === 0) {
        userListItems.innerHTML = '<div style="text-align:center;padding:1rem;opacity:0.5;">No ' + type + ' yet</div>';
        return;
      }
      
      let html = '';
      for (let i = 0; i < data.length; i++) {
        const item = data[i];
        const user = type === 'followers' ? item.users_followers_follower_id_fkey : item.users_followers_following_id_fkey;
        if (!user) continue;
        const avatar = user.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.username) + '&background=3b82f6&color=fff&size=64';
        const isFollow = followingCache.includes(user.id);
        html += '<div class="user-list-item">';
        html += '<div class="user-list-user" onclick="showProfile(\'' + user.id + '\'); userListModal.classList.remove(\'show\');">';
        html += '<img class="user-list-avatar" src="' + avatar + '" alt="' + user.username + '">';
        html += '<span class="user-list-username">' + user.username + '</span>';
        html += '</div>';
        if (currentUser && currentUser.id !== user.id) {
          html += '<button class="btn ' + (isFollow ? 'btn-unfollow' : 'btn-follow') + ' btn-sm" onclick="toggleFollow(\'' + user.id + '\')"><i class="fas ' + (isFollow ? 'fa-user-minus' : 'fa-user-plus') + '"></i></button>';
        }
        html += '</div>';
      }
      userListItems.innerHTML = html;
    } catch (error) {
      userListItems.innerHTML = '<div style="text-align:center;padding:1rem;color:#f87171;">Error loading users</div>';
    }
  };

  closeUserListModal.addEventListener('click', function() { userListModal.classList.remove('show'); });
  userListModal.addEventListener('click', function(e) {
    if (e.target === userListModal) userListModal.classList.remove('show');
  });

  // ---------- REACTIONS ----------
  const REACTION_EMOJIS = { like: '👍', heart: '❤️', funny: '😂', wow: '😮', sad: '😢' };
  let reactionData = {};

  window.toggleReaction = async function(postId, type) {
    if (!currentUser) { showAuthModal(); return; }
    
    try {
      const { data: existing } = await supabase
        .from('post_reactions')
        .select('id')
        .eq('post_id', postId)
        .eq('user_id', currentUser.id)
        .eq('reaction_type', type)
        .maybeSingle();
      
      if (existing) {
        await supabase.from('post_reactions').delete().eq('id', existing.id);
      } else {
        await supabase.from('post_reactions').insert([{
          post_id: postId,
          user_id: currentUser.id,
          reaction_type: type
        }]);
      }
      
      loadReactions(postId);
    } catch (error) {
      console.error('Error toggling reaction:', error);
    }
  };

  async function loadReactions(postId) {
    try {
      const { data, error } = await supabase
        .from('post_reactions')
        .select('reaction_type, user_id, users!post_reactions_user_id_fkey (id, username, avatar_url)')
        .eq('post_id', postId);
      
      if (error) throw error;
      
      const container = document.getElementById('reactions-' + postId);
      if (!container) return;
      
      const counts = {};
      data.forEach(function(r) { counts[r.reaction_type] = (counts[r.reaction_type] || 0) + 1; });
      
      const userReactions = data.filter(function(r) { return currentUser && r.user_id === currentUser.id; }).map(function(r) { return r.reaction_type; });
      
      let html = '';
      for (const key in REACTION_EMOJIS) {
        const emoji = REACTION_EMOJIS[key];
        const active = userReactions.includes(key) ? 'active' : '';
        const count = counts[key] || 0;
        html += '<button class="reaction-btn ' + active + '" onclick="toggleReaction(' + postId + ', \'' + key + '\')">';
        html += emoji + ' <span class="reaction-count" onclick="event.stopPropagation(); showReactionUsers(' + postId + ', \'' + key + '\')">' + count + '</span>';
        html += '</button>';
      }
      container.innerHTML = html;
      
      reactionData[postId] = data;
    } catch (error) {
      console.error('Error loading reactions:', error);
    }
  }

  window.showReactionUsers = function(postId, type) {
    const data = reactionData[postId];
    if (!data) { alert('No reactions yet.'); return; }
    
    const users = data.filter(function(r) { return r.reaction_type === type; });
    if (users.length === 0) {
      alert('No one has reacted with ' + REACTION_EMOJIS[type] + ' yet.');
      return;
    }
    
    reactionUsersTitle.innerHTML = '<i class="fas fa-reactions"></i> ' + REACTION_EMOJIS[type] + ' - ' + users.length + ' ' + (users.length === 1 ? 'person' : 'people');
    
    reactionUsersList.innerHTML = users.map(function(r) {
      const user = r.users;
      if (!user) return '';
      const avatar = user.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.username) + '&background=3b82f6&color=fff&size=64';
      return '<div class="reaction-user-item">' +
        '<div class="reaction-user-item" onclick="showProfile(\'' + user.id + '\'); reactionUsersModal.classList.remove(\'show\');">' +
        '<img class="reaction-user-avatar" src="' + avatar + '" alt="' + user.username + '">' +
        '<span class="reaction-user-username">' + user.username + '</span>' +
        '</div></div>';
    }).join('');
    
    reactionUsersModal.classList.add('show');
  };

  closeReactionUsersModal.addEventListener('click', function() { reactionUsersModal.classList.remove('show'); });
  reactionUsersModal.addEventListener('click', function(e) {
    if (e.target === reactionUsersModal) reactionUsersModal.classList.remove('show');
  });

  // ---------- COMMENTS ----------
  window.addComment = async function(postId) {
    if (!currentUser) { showAuthModal(); return; }
    
    const input = document.getElementById('commentInput-' + postId);
    const content = input.value.trim();
    if (!content) return;
    
    try {
      await supabase.from('comments').insert([{
        post_id: postId,
        user_id: currentUser.id,
        content: content
      }]);
      
      input.value = '';
      loadComments(postId);
    } catch (error) {
      alert('Error adding comment: ' + error.message);
    }
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.id && e.target.id.startsWith('commentInput-')) {
      const postId = parseInt(e.target.id.replace('commentInput-', ''));
      addComment(postId);
    }
  });

  window.deleteComment = async function(commentId, postId) {
    if (!confirm('Delete this comment?')) return;
    try {
      await supabase.from('comments').delete().eq('id', commentId);
      loadComments(postId);
    } catch (error) {
      alert('Error deleting comment: ' + error.message);
    }
  };

  async function loadComments(postId) {
    try {
      const { data, error } = await supabase
        .from('comments')
        .select('*, users!comments_user_id_fkey (id, username, avatar_url)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });
      
      if (error) throw error;
      
      const container = document.getElementById('commentsList-' + postId);
      if (!container) return;
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div style="font-size:0.8rem;opacity:0.4;padding:0.5rem 0;">No comments yet</div>';
        return;
      }
      
      let html = '';
      data.forEach(function(comment) {
        const author = comment.users?.username || 'Unknown';
        const avatar = comment.users?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(author) + '&background=3b82f6&color=fff&size=64';
        html += '<div class="comment-item">';
        html += '<img class="comment-avatar" src="' + avatar + '" alt="' + author + '" onclick="showProfile(\'' + comment.user_id + '\')">';
        html += '<div class="comment-body">';
        html += '<div class="comment-author" onclick="showProfile(\'' + comment.user_id + '\')">' + author + '</div>';
        html += '<div class="comment-text">' + comment.content + '</div>';
        html += '<div class="comment-time">' + new Date(comment.created_at).toLocaleString() + '</div>';
        if (currentUser && comment.user_id === currentUser.id) {
          html += '<div class="comment-actions"><button class="btn btn-danger btn-sm" onclick="deleteComment(' + comment.id + ', ' + postId + ')"><i class="fas fa-trash"></i></button></div>';
        }
        html += '</div></div>';
      });
      container.innerHTML = html;
    } catch (error) {
      console.error('Error loading comments:', error);
    }
  }

  // ---------- SUGGESTIONS ----------
  async function loadSuggestions() {
    if (!currentUser) {
      suggestionsBox.style.display = 'none';
      return;
    }
    
    try {
      const suggestions = allUsers
        .filter(function(u) { return u.id !== currentUser.id && !followingCache.includes(u.id); })
        .slice(0, 5);
      
      if (suggestions.length === 0) {
        suggestionsBox.style.display = 'none';
        return;
      }
      
      suggestionsBox.style.display = 'block';
      let html = '';
      suggestions.forEach(function(user) {
        const avatar = user.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.username) + '&background=3b82f6&color=fff&size=64';
        html += '<div class="suggestion-item">';
        html += '<div class="suggestion-user" onclick="showProfile(\'' + user.id + '\')">';
        html += '<img class="suggestion-avatar" src="' + avatar + '" alt="' + user.username + '">';
        html += '<span class="suggestion-username">' + user.username + '</span>';
        html += '</div>';
        html += '<button class="btn btn-follow btn-sm" onclick="toggleFollow(\'' + user.id + '\')"><i class="fas fa-user-plus"></i> Follow</button>';
        html += '</div>';
      });
      suggestionsList.innerHTML = html;
    } catch (error) {
      console.error('Error loading suggestions:', error);
    }
  }

  // ---------- LOAD POSTS ----------
  async function loadPosts() {
    try {
      const { data, error } = await supabase
        .from('posts')
        .select('*, users!posts_author_id_fkey (id, username, avatar_url)')
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false });
      
      if (error) throw error;
      allPosts = data || [];
      filterPosts();
      updateSyncStatus('Synced');
    } catch (error) {
      console.error('Error loading posts:', error);
      updateSyncStatus('Error');
      allPosts = [];
      renderPosts();
    }
  }

  // ---------- FILTER POSTS ----------
  function filterPosts() {
    let filtered = [...allPosts];
    
    if (currentFilter === 'my' && currentUser) {
      filtered = filtered.filter(function(p) { return p.author_id === currentUser.id; });
    } else if (currentFilter === 'following' && currentUser) {
      if (followingCache.length === 0) {
        renderFilteredPosts(filtered);
        return;
      }
      filtered = filtered.filter(function(p) {
        return followingCache.includes(p.author_id) || p.author_id === currentUser.id;
      });
    }
    
    renderFilteredPosts(filtered);
  }

  function renderFilteredPosts(posts) {
    posts.sort(function(a, b) {
      if (a.is_pinned && !b.is_pinned) return -1;
      if (!a.is_pinned && b.is_pinned) return 1;
      return new Date(b.created_at) - new Date(a.created_at);
    });
    renderPosts(posts);
  }

  // ---------- FEED NAV ----------
  feedNavBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      feedNavBtns.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      filterPosts();
    });
  });

  // ---------- RENDER POSTS ----------
  function renderPosts(postsToRender) {
    const posts = postsToRender || allPosts;
    
    if (!postsFeed) return;
    
    if (posts.length === 0) {
      postsFeed.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>' + 
        (currentFilter === 'my' ? "You haven't posted anything yet." : 
         currentFilter === 'following' ? "No posts from people you follow. Try the Global feed!" :
         "No posts yet. Be the first to create one!") + 
        '</p></div>';
      return;
    }
    
    let html = '';
    posts.forEach(function(post) {
      const isAuthor = currentUser && post.author_id === currentUser.id;
      const authorName = post.users?.username || 'Unknown';
      const authorAvatar = post.users?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(authorName) + '&background=3b82f6&color=fff&size=64';
      
      html += '<div class="post-item ' + (post.is_pinned ? 'pinned' : '') + '" id="post-' + post.id + '">';
      html += '<div class="post-header">';
      html += '<div>';
      html += '<div class="post-author" onclick="showProfile(\'' + post.author_id + '\')">';
      html += '<img class="post-author-avatar" src="' + authorAvatar + '" alt="' + authorName + '">';
      html += '<span class="post-author-name">' + authorName + '</span>';
      if (post.is_pinned) html += '<span class="pinned-badge"><i class="fas fa-thumbtack"></i> Pinned</span>';
      html += '</div>';
      if (post.title) html += '<div class="post-title">' + post.title + '</div>';
      html += '</div>';
      html += '<div class="post-meta">' + new Date(post.created_at).toLocaleString() + (post.updated_at !== post.created_at ? ' (edited)' : '') + '</div>';
      html += '</div>';
      html += '<div class="post-content">' + post.content_html + '</div>';
      if (post.media_data) html += renderMedia(post);
      
      html += '<div class="post-reactions" id="reactions-' + post.id + '"><span style="font-size:0.8rem;opacity:0.5;">Loading reactions...</span></div>';
      
      html += '<div class="comments-section" id="comments-' + post.id + '">';
      html += '<div id="commentsList-' + post.id + '"></div>';
      if (currentUser) {
        html += '<div class="comment-input-wrapper">';
        html += '<input type="text" id="commentInput-' + post.id + '" placeholder="Write a comment...">';
        html += '<button class="btn btn-primary btn-sm" onclick="addComment(' + post.id + ')"><i class="fas fa-paper-plane"></i></button>';
        html += '</div>';
      }
      html += '</div>';
      
      html += '<div class="post-actions">';
      if (isAuthor) {
        html += '<button class="btn btn-outline" onclick="editPost(' + post.id + ')"><i class="fas fa-edit"></i> Edit</button>';
        html += '<button class="btn btn-danger" onclick="deletePost(' + post.id + ')"><i class="fas fa-trash"></i> Delete</button>';
      }
      html += '<button class="btn btn-outline" onclick="showQR(\'post\', ' + post.id + ', \'' + encodeURIComponent(post.title || 'Post') + '\')"><i class="fas fa-qrcode"></i> QR</button>';
      html += '<button class="btn btn-outline" onclick="sharePost(' + post.id + ')"><i class="fas fa-share-alt"></i> Share</button>';
      html += '<button class="btn btn-outline" onclick="viewHistory(' + post.id + ')"><i class="fas fa-history"></i> History</button>';
      html += '</div>';
      html += '</div>';
    });
    
    postsFeed.innerHTML = html;
    
    posts.forEach(function(post) {
      loadComments(post.id);
      loadReactions(post.id);
    });
  }

  function renderMedia(post) {
    const mediaType = post.media_type || '';
    const mediaData = post.media_data || '';
    
    if (mediaType.includes('image') || mediaType === 'image') {
      return '<img src="' + mediaData + '" alt="Image" loading="lazy" style="max-width:100%;border-radius:16px;margin:0.3rem 0;">';
    } else if (mediaType.includes('gif') || mediaType === 'gif') {
      return '<img src="' + mediaData + '" alt="GIF" loading="lazy" style="max-width:100%;border-radius:16px;margin:0.3rem 0;">';
    } else if (mediaType.includes('spotify') || mediaType === 'spotify') {
      const match = mediaData.match(/spotify\.com\/(track|playlist|episode)\/([a-zA-Z0-9]+)/);
      if (match) {
        return '<iframe src="https://open.spotify.com/embed/' + match[1] + '/' + match[2] + '" allow="encrypted-media" style="width:100%;height:80px;border-radius:16px;border:none;"></iframe>';
      }
      return '<a href="' + mediaData + '" target="_blank">' + mediaData + '</a>';
    }
    return '';
  }

  // ---------- POST OPERATIONS ----------
  window.editPost = function(postId) {
    const post = allPosts.find(function(p) { return p.id === postId; });
    if (!post || post.author_id !== currentUser?.id) return;
    
    editingPostId = postId;
    postTitleInput.value = post.title || '';
    quill.root.innerHTML = post.content_html || '';
    createArea.classList.add('show');
    createArea.scrollIntoView({ behavior: 'smooth' });
    createPostToggle.innerHTML = '<i class="fas fa-times"></i> Close';
    
    if (post.media_type) {
      const btn = document.querySelector('.post-option-btn[data-type="' + post.media_type + '"]');
      if (btn) btn.click();
    }
  };

  window.deletePost = async function(postId) {
    const post = allPosts.find(function(p) { return p.id === postId; });
    if (!post || post.author_id !== currentUser?.id) return;
    if (!confirm('Delete this post permanently?')) return;
    
    try {
      await supabase.from('posts').delete().eq('id', postId);
      await loadPosts();
    } catch (error) {
      alert('Error deleting post: ' + error.message);
    }
  };

  window.viewHistory = async function(postId) {
    try {
      const { data, error } = await supabase
        .from('post_history')
        .select('*')
        .eq('post_id', postId)
        .order('changed_at', { ascending: false });
      
      if (error) throw error;
      
      if (!data || data.length === 0) {
        alert('No history available for this post.');
        return;
      }
      
      let msg = '📜 Post History:\n\n';
      data.forEach(function(h, i) {
        msg += 'Version ' + (data.length - i) + ' (' + new Date(h.changed_at).toLocaleString() + '):\n';
        msg += h.content.substring(0, 200) + (h.content.length > 200 ? '...' : '') + '\n\n';
      });
      alert(msg);
    } catch (error) {
      alert('Error loading history: ' + error.message);
    }
  };

  // ---------- CREATE POST ----------
  createBtn.addEventListener('click', async function() {
    if (!currentUser) { showAuthModal(); return; }
    
    const title = postTitleInput.value.trim();
    const content = quill.root.innerHTML;
    const textContent = quill.getText().trim();
    
    if (!textContent && !uploadedFileDataURL && !spotifyInput.value.trim()) {
      alert('Please add some content to your post.');
      return;
    }
    
    let mediaData = '';
    let mediaType = selectedPostType;
    
    if (uploadedFileDataURL) {
      mediaData = uploadedFileDataURL;
      mediaType = selectedPostType.includes('gif') ? 'gif' : 'image';
    } else if (spotifyInput.value.trim()) {
      mediaData = spotifyInput.value.trim();
      mediaType = 'spotify';
    }
    
    const isPinned = selectedPostType === 'pinned';
    
    const postData = {
      title: title,
      content: textContent,
      content_html: content,
      author_id: currentUser.id,
      timestamp: new Date().toISOString(),
      media_data: mediaData,
      media_type: mediaType,
      is_pinned: isPinned
    };
    
    try {
      if (editingPostId) {
        const { error } = await supabase
          .from('posts')
          .update(Object.assign({}, postData, { updated_at: new Date().toISOString() }))
          .eq('id', editingPostId)
          .eq('author_id', currentUser.id);
        
        if (error) throw error;
        
        await supabase.from('post_history').insert([{
          post_id: editingPostId,
          content: textContent,
          content_html: content
        }]);
        
        editingPostId = null;
      } else {
        const { error } = await supabase.from('posts').insert([postData]);
        if (error) throw error;
      }
      
      clearBtn.click();
      createArea.classList.remove('show');
      createPostToggle.innerHTML = '<i class="fas fa-pen-fancy"></i> Create a new post';
      await loadPosts();
    } catch (error) {
      alert('Error saving post: ' + error.message);
    }
  });

  // ---------- POST TYPE SELECTION ----------
  postOptionBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      postOptionBtns.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      selectedPostType = this.dataset.type;
      updatePostTypeUI(selectedPostType);
    });
  });

  function updatePostTypeUI(type) {
    fileUploadWrapper.style.display = 'none';
    spotifyWrapper.style.display = 'none';
    filePreview.classList.remove('show');
    uploadedFileDataURL = null;
    
    if (type === 'image' || type === 'text-image') {
      fileUploadWrapper.style.display = 'block';
      fileInput.accept = 'image/*';
    } else if (type === 'gif' || type === 'text-gif') {
      fileUploadWrapper.style.display = 'block';
      fileInput.accept = 'image/gif';
    } else if (type === 'spotify' || type === 'text-spotify') {
      spotifyWrapper.style.display = 'flex';
    }
  }

  fileInput.addEventListener('change', function(e) {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        uploadedFileDataURL = event.target.result;
        filePreview.src = event.target.result;
        filePreview.classList.add('show');
      };
      reader.readAsDataURL(file);
    }
  });

  clearBtn.addEventListener('click', function() {
    postTitleInput.value = '';
    quill.setText('');
    fileInput.value = '';
    filePreview.classList.remove('show');
    uploadedFileDataURL = null;
    spotifyInput.value = '';
    editingPostId = null;
  });

  // ---------- SHARING ----------
  window.sharePost = function(postId) {
    const post = allPosts.find(function(p) { return p.id === postId; });
    if (!post) return;
    
    const url = window.location.href + '?post=' + postId;
    const text = post.title || 'Check out this post!';
    
    if (navigator.share) {
      navigator.share({
        title: text,
        text: post.content?.substring(0, 100) || '',
        url: url
      }).catch(function() {});
    } else {
      navigator.clipboard.writeText(url).then(function() {
        alert('🔗 Link copied to clipboard! Share it with others.');
      }).catch(function() {
        prompt('Copy this link:', url);
      });
    }
  };

  // ---------- QR CODE ----------
  window.showQR = function(type, id, label) {
    const url = window.location.href + '?' + type + '=' + id;
    currentQRData = { type: type, id: id, url: url, label: label };
    
    qrContainer.innerHTML = '';
    qrCodeInstance = new QRCode(qrContainer, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#ffffff',
      colorLight: '#0b0d10',
      correctLevel: QRCode.CorrectLevel.H
    });
    
    qrLabel.textContent = 'Scan to view ' + (label || 'this');
    qrModal.classList.add('show');
  };

  closeQRModal.addEventListener('click', function() { qrModal.classList.remove('show'); });
  qrModal.addEventListener('click', function(e) {
    if (e.target === qrModal) qrModal.classList.remove('show');
  });

  downloadQRBtn.addEventListener('click', function() {
    const canvas = qrContainer.querySelector('canvas');
    if (canvas) {
      const link = document.createElement('a');
      link.download = 'qr-' + (currentQRData?.type || 'code') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  });

  // ---------- SETTINGS ----------
  settingsBtn.addEventListener('click', function() { settingsModal.classList.add('show'); });
  closeSettingsModal.addEventListener('click', function() { settingsModal.classList.remove('show'); });
  settingsModal.addEventListener('click', function(e) {
    if (e.target === settingsModal) settingsModal.classList.remove('show');
  });

  settingsThemeGrid.querySelectorAll('.settings-theme-option').forEach(function(option) {
    option.addEventListener('click', function() {
      const theme = this.dataset.theme;
      document.body.className = theme;
      settingsThemeGrid.querySelectorAll('.settings-theme-option').forEach(function(el) { el.classList.remove('active'); });
      this.classList.add('active');
      localStorage.setItem('selected_theme', theme);
    });
  });

  // ---------- SYNC STATUS ----------
  function updateSyncStatus(status) {
    if (!syncStatus) return;
    const icons = { Synced: 'fa-check-circle', Loading: 'fa-spinner fa-spin', Error: 'fa-exclamation-circle' };
    syncStatus.innerHTML = '<i class="fas ' + (icons[status] || 'fa-circle') + '"></i> ' + status;
  }

  // ---------- INIT ----------
  function init() {
    const savedTheme = localStorage.getItem('selected_theme') || 'dark';
    document.body.className = savedTheme;
    const activeOption = settingsThemeGrid.querySelector('.settings-theme-option[data-theme="' + savedTheme + '"]');
    if (activeOption) activeOption.classList.add('active');

    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        updateUI();
        updateFollowingCache();
        loadAllData();
      } catch(e) { localStorage.removeItem('currentUser'); }
    } else {
      updateUI();
      loadAllData();
    }

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
        e.preventDefault(); return false;
      }
      if (e.ctrlKey && e.key === 'p') { e.preventDefault(); return false; }
    });

    console.log('🚀 Secret Social Network Loaded');
    console.log('🔍 Search: Type to see autocomplete suggestions');
    console.log('👥 Click on search results to view profile & posts');
    console.log('❤️ Click on reaction counts to see who reacted');
  }

  init();
})();
</script>
</body>
</html>
