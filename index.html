<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔐 Secret Files</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0d10;
      color: #f0f3f8;
      transition: background 0.3s, color 0.2s;
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.light {
      background: #f5f7fa;
      color: #1e2329;
    }
    body.blue {
      background: linear-gradient(145deg, #0a1f2e, #0b2b3f);
      color: #e3f0ff;
    }
    body.green {
      background: linear-gradient(145deg, #0f2a1a, #143f25);
      color: #daf5e8;
    }
    body.rose {
      background: linear-gradient(145deg, #2f1a2b, #4a243d);
      color: #fae2f0;
    }
    body.amber {
      background: linear-gradient(145deg, #2f2413, #4d3a1a);
      color: #faf0d6;
    }

    .app-container {
      max-width: 820px;
      width: 100%;
      background: rgba(20, 24, 30, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 42px;
      padding: 1.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      transition: background 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }
    body.light .app-container {
      background: rgba(240, 244, 250, 0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem 0.5rem;
      margin-bottom: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo i {
      color: #ffb347;
      text-shadow: 0 0 10px #ff9f2e80;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
    }

    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 100px;
      color: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.2s ease;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .btn i { font-size: 1rem; }
    .btn-primary {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 12px #3b82f640;
      border: none;
    }
    .btn-primary:hover { background: #2563eb; transform: scale(0.97); }
    .btn-danger {
      background: #e5484d;
      color: white;
    }
    .btn-danger:hover { background: #c73b3f; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.06); }
    .btn-success {
      background: #22c55e;
      color: white;
    }
    .btn-success:hover { background: #16a34a; }
    .btn-purple {
      background: #8b5cf6;
      color: white;
    }
    .btn-purple:hover { background: #7c3aed; }
    .btn-gold {
      background: #f59e0b;
      color: #1e2329;
    }
    .btn-gold:hover { background: #d97706; }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }
    .status-badge.synced { color: #22c55e; background: rgba(34, 197, 94, 0.2); }
    .status-badge.error { color: #ef4444; background: rgba(239, 68, 68, 0.2); }
    .status-badge.offline { color: #f59e0b; background: rgba(245, 158, 11, 0.2); }

    /* Admin Password Modal */
    #adminModal {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1.5rem;
    }
    #adminModal.show {
      display: flex;
    }
    .admin-modal-card {
      background: rgba(25, 30, 38, 0.95);
      padding: 2.5rem 2.2rem;
      border-radius: 48px;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      text-align: center;
      position: relative;
    }
    .admin-modal-card .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .admin-modal-card .close-btn:hover {
      color: #fff;
      transform: rotate(90deg);
    }
    .admin-modal-card h2 {
      margin-bottom: 0.5rem;
      font-weight: 600;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      align-items: center;
    }
    .admin-modal-card p {
      opacity: 0.6;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .admin-modal-card input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 60px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      outline: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }
    .admin-modal-card input:focus {
      outline: 2px solid #3b82f6;
    }
    .admin-modal-card .btn {
      width: 100%;
      justify-content: center;
      font-size: 1.1rem;
      padding: 0.8rem;
    }
    .admin-wrong-pass {
      color: #f87171;
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }

    .theme-selector {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .theme-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: 0.2s;
    }
    .theme-dot:hover { transform: scale(1.1); }
    .theme-dot.active { border-color: white; box-shadow: 0 0 12px #ffffff70; }

    .posts-section {
      margin-top: 1.8rem;
    }
    .post-item {
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #3b82f6;
      transition: 0.2s;
      word-break: break-word;
    }
    body.light .post-item {
      background: rgba(255, 255, 255, 0.5);
      border-left-color: #2563eb;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem 0.8rem;
      margin-bottom: 0.5rem;
    }
    .post-content {
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0.5rem 0 0.8rem 0;
      white-space: pre-wrap;
    }
    .post-content img, .post-content video {
      max-width: 100%;
      border-radius: 20px;
      margin: 0.5rem 0;
    }
    .post-content iframe {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 20px;
    }
    .post-media {
      margin: 0.5rem 0;
    }
    .post-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .post-actions .btn {
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
    }
    .post-timestamp {
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 0.4rem;
    }
    .post-type-badge {
      font-size: 0.6rem;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .create-post-area {
      background: rgba(0,0,0,0.15);
      border-radius: 32px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 2rem;
      border: 1px dashed rgba(255,255,255,0.08);
    }
    .create-post-area textarea {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 24px;
      border: none;
      background: rgba(0,0,0,0.2);
      color: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 70px;
      outline: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
      font-family: inherit;
    }
    .create-post-area textarea:focus {
      outline: 2px solid #3b82f6;
    }

    .post-options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.6rem;
      margin: 0.8rem 0;
    }
    .post-option-btn {
      padding: 0.6rem 0.8rem;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .post-option-btn:hover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    .post-option-btn.active {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.2);
    }
    .post-option-btn i {
      font-size: 1rem;
    }

    .file-input-wrapper {
      margin: 0.5rem 0;
    }
    .file-input-wrapper input[type="file"] {
      display: none;
    }
    .file-input-wrapper .file-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 16px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px dashed rgba(59, 130, 246, 0.3);
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .file-input-wrapper .file-label:hover {
      background: rgba(59, 130, 246, 0.25);
    }
    .file-preview {
      max-width: 200px;
      max-height: 150px;
      border-radius: 12px;
      margin: 0.5rem 0;
      display: none;
    }
    .file-preview.show {
      display: block;
    }

    .spotify-input-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin: 0.5rem 0;
    }
    .spotify-input-wrapper input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: inherit;
      font-size: 0.9rem;
    }
    .spotify-input-wrapper input:focus {
      outline: 2px solid #3b82f6;
    }

    .create-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }

    .media-hint {
      font-size: 0.8rem;
      opacity: 0.6;
      margin: 0.4rem 0 0.2rem;
    }

    .admin-badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }

    @media (max-width: 600px) {
      .app-container { padding: 1.2rem 1rem; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .logo { font-size: 1.6rem; justify-content: center; }
      .toolbar-actions { justify-content: center; }
      .post-item { padding: 1.2rem; }
      .post-options-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .admin-modal-card { padding: 2rem 1.2rem; }
      .btn { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
      .post-options-grid { grid-template-columns: 1fr 1fr; }
    }

    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }
    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: auto;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem 0;
      color: #fca5a5;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- ADMIN MODAL -->
  <div id="adminModal">
    <div class="admin-modal-card">
      <button class="close-btn" id="closeAdminModal"><i class="fas fa-times"></i></button>
      <h2><i class="fas fa-crown" style="color:#fbbf24;"></i> Admin Access</h2>
      <p>Enter the admin password to create, edit, or delete posts</p>
      <input type="password" id="adminPasswordInput" placeholder="Enter admin password" autofocus>
      <button class="btn btn-gold" id="adminUnlockBtn"><i class="fas fa-key"></i> Unlock Admin</button>
      <div id="adminWrongPass" class="admin-wrong-pass"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-container" id="appContainer">
    <div class="top-bar">
      <div class="logo"><i class="fas fa-folder-open"></i> Secret<span style="font-weight:400;">Files</span></div>
      <div class="toolbar-actions">
        <span id="userRoleBadge" class="admin-badge" style="display:none;"><i class="fas fa-crown"></i> Admin</span>
        <span id="syncStatus" class="status-badge"><i class="fas fa-sync fa-spin"></i> Connecting</span>
        <div class="theme-selector">
          <span class="theme-dot active" data-theme="dark" style="background:#0b0d10;"></span>
          <span class="theme-dot" data-theme="light" style="background:#f0f3f8; border-color:#aaa;"></span>
          <span class="theme-dot" data-theme="blue" style="background:#0b2b3f;"></span>
          <span class="theme-dot" data-theme="green" style="background:#143f25;"></span>
          <span class="theme-dot" data-theme="rose" style="background:#4a243d;"></span>
          <span class="theme-dot" data-theme="amber" style="background:#4d3a1a;"></span>
        </div>
        <button class="btn btn-gold" id="adminBtn"><i class="fas fa-crown"></i> Admin</button>
        <button class="btn btn-outline" id="lockAdminBtn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <!-- Create Post (hidden by default) -->
    <div id="createPostArea" class="create-post-area" style="display: none;">
      <h4 style="margin-bottom:0.5rem;"><i class="fas fa-pen-fancy"></i> New Secret Post</h4>
      
      <textarea id="postContentInput" placeholder="Write your message here..."></textarea>
      
      <div class="post-options-grid" id="postOptionsGrid">
        <button class="post-option-btn active" data-type="text">
          <i class="fas fa-font"></i> Text
        </button>
        <button class="post-option-btn" data-type="image">
          <i class="fas fa-image"></i> Image
        </button>
        <button class="post-option-btn" data-type="gif">
          <i class="fas fa-film"></i> GIF
        </button>
        <button class="post-option-btn" data-type="spotify">
          <i class="fab fa-spotify"></i> Spotify
        </button>
        <button class="post-option-btn" data-type="text-image">
          <i class="fas fa-font"></i>+<i class="fas fa-image"></i> Text+Img
        </button>
        <button class="post-option-btn" data-type="text-gif">
          <i class="fas fa-font"></i>+<i class="fas fa-film"></i> Text+GIF
        </button>
        <button class="post-option-btn" data-type="text-spotify">
          <i class="fas fa-font"></i>+<i class="fab fa-spotify"></i> Text+Spotify
        </button>
      </div>
      
      <!-- File Upload -->
      <div class="file-input-wrapper" id="fileUploadWrapper" style="display:none;">
        <label class="file-label" for="fileInput">
          <i class="fas fa-upload"></i> Choose File
        </label>
        <input type="file" id="fileInput" accept="image/*,.gif">
        <br>
        <img id="filePreview" class="file-preview" alt="Preview">
      </div>
      
      <!-- Spotify Input -->
      <div class="spotify-input-wrapper" id="spotifyWrapper" style="display:none;">
        <i class="fab fa-spotify" style="color:#1DB954;"></i>
        <input type="text" id="spotifyInput" placeholder="Paste Spotify URL (track, playlist, episode)">
      </div>
      
      <div class="media-hint"><i class="fas fa-info-circle"></i> Select a post type above and add your content</div>
      
      <div class="create-actions">
        <button class="btn btn-primary" id="createPostBtn"><i class="fas fa-plus-circle"></i> Create Post</button>
        <button class="btn btn-outline" id="clearPostBtn"><i class="fas fa-times"></i> Clear</button>
      </div>
    </div>

    <!-- Posts feed -->
    <div class="posts-section" id="postsFeed">
      <div style="text-align:center;padding:2rem;opacity:0.5;">
        <div class="loading-spinner"></div>
        <p style="margin-top:0.5rem;">Loading posts from Supabase...</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- CONFIG ----------
      const ADMIN_PASSWORD = 'secret2026';
      let isAdmin = false;
      let posts = [];
      let selectedPostType = 'text';
      let uploadedFile = null;
      let uploadedFileDataURL = null;

      // Supabase Config
      const SUPABASE_URL = 'https://pdrfhjbehihehbadoaty.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkcmZoamJlaGloZWhiYWRvYXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzgyNTEsImV4cCI6MjA5ODg1NDI1MX0.j541e7W56nVCESK_nsVUsGjAv2mOHGb27wwACJZKlBE';

      // Initialize Supabase
      let supabase;
      try {
        if (typeof supabase !== 'undefined') {
          supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else if (typeof window.supabase !== 'undefined') {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else {
          throw new Error('Supabase SDK not loaded.');
        }
        console.log('✅ Supabase initialized');
      } catch (error) {
        console.error('❌ Supabase init error:', error);
      }

      // DOM refs
      const adminModal = document.getElementById('adminModal');
      const closeAdminModal = document.getElementById('closeAdminModal');
      const adminPasswordInput = document.getElementById('adminPasswordInput');
      const adminUnlockBtn = document.getElementById('adminUnlockBtn');
      const adminWrongPass = document.getElementById('adminWrongPass');
      const adminBtn = document.getElementById('adminBtn');
      const lockAdminBtn = document.getElementById('lockAdminBtn');
      const userRoleBadge = document.getElementById('userRoleBadge');
      
      const postsFeed = document.getElementById('postsFeed');
      const createArea = document.getElementById('createPostArea');
      const contentInput = document.getElementById('postContentInput');
      const createBtn = document.getElementById('createPostBtn');
      const clearBtn = document.getElementById('clearPostBtn');
      const themeDots = document.querySelectorAll('.theme-dot');
      const syncStatus = document.getElementById('syncStatus');
      
      const fileInput = document.getElementById('fileInput');
      const filePreview = document.getElementById('filePreview');
      const fileUploadWrapper = document.getElementById('fileUploadWrapper');
      const spotifyWrapper = document.getElementById('spotifyWrapper');
      const spotifyInput = document.getElementById('spotifyInput');
      const postOptionBtns = document.querySelectorAll('.post-option-btn');

      // ---------- ADMIN MODAL ----------
      function showAdminModal() {
        adminModal.classList.add('show');
        adminPasswordInput.value = '';
        adminWrongPass.textContent = '';
        setTimeout(() => adminPasswordInput.focus(), 100);
      }

      function hideAdminModal() {
        adminModal.classList.remove('show');
        adminPasswordInput.value = '';
        adminWrongPass.textContent = '';
      }

      closeAdminModal.addEventListener('click', hideAdminModal);
      adminModal.addEventListener('click', function(e) {
        if (e.target === this) hideAdminModal();
      });

      adminUnlockBtn.addEventListener('click', function() {
        const password = adminPasswordInput.value;
        if (password === ADMIN_PASSWORD) {
          isAdmin = true;
          hideAdminModal();
          createArea.style.display = 'block';
          adminBtn.style.display = 'none';
          lockAdminBtn.style.display = 'inline-flex';
          userRoleBadge.style.display = 'inline-block';
          loadPosts();
        } else {
          adminWrongPass.textContent = '❌ Wrong admin password!';
          adminPasswordInput.value = '';
          adminPasswordInput.focus();
        }
      });

      adminPasswordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') adminUnlockBtn.click();
      });

      adminBtn.addEventListener('click', showAdminModal);

      lockAdminBtn.addEventListener('click', function() {
        isAdmin = false;
        createArea.style.display = 'none';
        adminBtn.style.display = 'inline-flex';
        lockAdminBtn.style.display = 'none';
        userRoleBadge.style.display = 'none';
        renderPosts();
      });

      // ---------- POST TYPE SELECTION ----------
      postOptionBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          postOptionBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          selectedPostType = this.dataset.type;
          updatePostTypeUI(selectedPostType);
        });
      });

      function updatePostTypeUI(type) {
        fileUploadWrapper.style.display = 'none';
        spotifyWrapper.style.display = 'none';
        filePreview.classList.remove('show');
        uploadedFile = null;
        uploadedFileDataURL = null;
        
        if (type === 'image' || type === 'text-image') {
          fileUploadWrapper.style.display = 'block';
          fileInput.accept = 'image/*';
        } else if (type === 'gif' || type === 'text-gif') {
          fileUploadWrapper.style.display = 'block';
          fileInput.accept = 'image/gif';
        } else if (type === 'spotify' || type === 'text-spotify') {
          spotifyWrapper.style.display = 'flex';
        }
        
        const hasText = ['text', 'text-image', 'text-gif', 'text-spotify'].includes(type);
        contentInput.style.display = hasText ? 'block' : 'none';
        if (!hasText) contentInput.value = '';
      }

      // File upload
      fileInput.addEventListener('change', function(e) {
        const file = this.files[0];
        if (file) {
          uploadedFile = file;
          const reader = new FileReader();
          reader.onload = function(event) {
            uploadedFileDataURL = event.target.result;
            filePreview.src = event.target.result;
            filePreview.classList.add('show');
          };
          reader.readAsDataURL(file);
        }
      });

      clearBtn.addEventListener('click', function() {
        contentInput.value = '';
        fileInput.value = '';
        filePreview.classList.remove('show');
        uploadedFile = null;
        uploadedFileDataURL = null;
        spotifyInput.value = '';
      });

      // ---------- HELPER FUNCTIONS ----------
      function updateStatus(status) {
        if (!syncStatus) return;
        const icon = status === 'Loading' ? 'fa-sync fa-spin' :
                    status === 'Saving' ? 'fa-upload fa-spin' :
                    status === 'Synced' ? 'fa-check-circle' :
                    status === 'Error' ? 'fa-exclamation-circle' :
                    status === 'Offline' ? 'fa-wifi' : 'fa-sync';
        const className = status === 'Synced' ? 'synced' :
                         status === 'Error' ? 'error' :
                         status === 'Offline' ? 'offline' : '';
        syncStatus.className = `status-badge ${className}`;
        syncStatus.innerHTML = `<i class="fas ${icon}"></i> ${status}`;
      }

      // ---------- SUPABASE CRUD ----------
      async function fetchPosts() {
        try {
          updateStatus('Loading');
          if (!supabase) throw new Error('Supabase not initialized');
          
          const { data, error } = await supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;
          
          posts = data || [];
          updateStatus('Synced');
          localStorage.setItem('secret_posts_backup', JSON.stringify(posts));
          return posts;
        } catch (error) {
          console.error('Error fetching posts:', error);
          updateStatus('Error');
          const localData = localStorage.getItem('secret_posts_backup');
          if (localData) {
            posts = JSON.parse(localData);
            updateStatus('Offline');
            return posts;
          }
          return [];
        }
      }

      async function createPost(content, mediaData, mediaType) {
        try {
          updateStatus('Saving');
          if (!supabase) throw new Error('Supabase not initialized');
          
          const postData = {
            content: content || '',
            timestamp: new Date().toISOString(),
            media_data: mediaData || '',
            media_type: mediaType || 'text'
          };
          
          const { data, error } = await supabase
            .from('posts')
            .insert([postData])
            .select();

          if (error) throw error;
          
          updateStatus('Synced');
          return data[0];
        } catch (error) {
          console.error('Error creating post:', error);
          updateStatus('Error');
          alert(`⚠️ Could not save: ${error.message}`);
          return null;
        }
      }

      async function updatePost(id, content, mediaData, mediaType) {
        try {
          updateStatus('Saving');
          if (!supabase) throw new Error('Supabase not initialized');
          
          const updateData = {
            content: content || '',
            timestamp: new Date().toISOString(),
            media_data: mediaData || '',
            media_type: mediaType || 'text'
          };
          
          const { data, error } = await supabase
            .from('posts')
            .update(updateData)
            .eq('id', id)
            .select();

          if (error) throw error;
          
          updateStatus('Synced');
          return data[0];
        } catch (error) {
          console.error('Error updating post:', error);
          updateStatus('Error');
          alert(`⚠️ Could not update: ${error.message}`);
          return null;
        }
      }

      async function deletePost(id) {
        try {
          updateStatus('Saving');
          if (!supabase) throw new Error('Supabase not initialized');
          
          const { error } = await supabase
            .from('posts')
            .delete()
            .eq('id', id);

          if (error) throw error;
          
          updateStatus('Synced');
          return true;
        } catch (error) {
          console.error('Error deleting post:', error);
          updateStatus('Error');
          alert(`⚠️ Could not delete: ${error.message}`);
          return false;
        }
      }

      // ---------- FORMAT CONTENT ----------
      function formatPost(post) {
        let html = '';
        
        if (post.content) {
          html += `<div>${post.content.replace(/\n/g, '<br>')}</div>`;
        }
        
        if (post.media_data) {
          const mediaType = post.media_type || '';
          
          if (mediaType.includes('image') || mediaType === 'image') {
            html += `<div class="post-media"><img src="${post.media_data}" alt="Image" loading="lazy"></div>`;
          } else if (mediaType.includes('gif') || mediaType === 'gif') {
            html += `<div class="post-media"><img src="${post.media_data}" alt="GIF" loading="lazy"></div>`;
          } else if (mediaType.includes('spotify') || mediaType === 'spotify') {
            const match = post.media_data.match(/spotify\.com\/(track|playlist|episode)\/([a-zA-Z0-9]+)/);
            if (match) {
              html += `<div class="post-media"><iframe src="https://open.spotify.com/embed/${match[1]}/${match[2]}" allow="encrypted-media"></iframe></div>`;
            }
          }
        }
        
        return html || 'Empty post';
      }

      // ---------- RENDER ----------
      function renderPosts() {
        if (!postsFeed) return;
        
        if (posts.length === 0) {
          postsFeed.innerHTML = `
            <div style="text-align:center;padding:2rem;opacity:0.5;">
              <i class="fas fa-inbox fa-2x"></i>
              <p style="margin-top:0.5rem;">No secrets yet.</p>
            </div>
          `;
          return;
        }

        let html = '';
        posts.forEach((post, index) => {
          const postContent = formatPost(post);
          const postId = post.id;
          
          html += `
            <div class="post-item" data-id="${postId}">
              <div class="post-header">
                <span style="opacity:0.6;font-size:0.8rem;">
                  <i class="far fa-file-alt"></i> #${index+1}
                  ${post.media_type ? `<span class="post-type-badge"><i class="fas fa-${post.media_type.includes('image') ? 'image' : post.media_type.includes('gif') ? 'film' : post.media_type.includes('spotify') ? 'music' : 'font'}"></i> ${post.media_type}</span>` : ''}
                </span>
                <span style="font-size:0.7rem;opacity:0.4;">
                  ${new Date(post.timestamp).toLocaleString()}
                </span>
              </div>
              <div class="post-content">${postContent}</div>
              ${isAdmin ? `
                <div class="post-actions">
                  <button class="btn btn-outline editPostBtn" data-id="${postId}">
                    <i class="fas fa-edit"></i> Edit
                  </button>
                  <button class="btn btn-danger deletePostBtn" data-id="${postId}">
                    <i class="fas fa-trash"></i> Delete
                  </button>
                </div>
              ` : ''}
              <div class="post-timestamp">${new Date(post.timestamp).toLocaleDateString()}</div>
            </div>
          `;
        });
        
        postsFeed.innerHTML = html;

        if (isAdmin) {
          document.querySelectorAll('.editPostBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const id = parseInt(btn.dataset.id);
              const post = posts.find(p => p.id === id);
              if (post) {
                const newContent = prompt('Edit content:', post.content || '');
                if (newContent !== null) {
                  const updated = await updatePost(id, newContent, post.media_data || '', post.media_type || 'text');
                  if (updated) await loadPosts();
                }
              }
            });
          });

          document.querySelectorAll('.deletePostBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const id = parseInt(btn.dataset.id);
              if (confirm('Permanently delete this post?')) {
                const success = await deletePost(id);
                if (success) await loadPosts();
              }
            });
          });
        }
      }

      // ---------- CREATE POST ----------
      async function handleCreatePost() {
        if (!isAdmin) {
          showAdminModal();
          return;
        }
        
        let content = contentInput.value.trim();
        let mediaData = '';
        let mediaType = selectedPostType;
        
        if (selectedPostType.includes('image') || selectedPostType === 'image') {
          if (uploadedFileDataURL) {
            mediaData = uploadedFileDataURL;
            mediaType = 'image';
          } else if (selectedPostType === 'image') {
            alert('Please select an image file.');
            return;
          }
        }
        
        if (selectedPostType.includes('gif') || selectedPostType === 'gif') {
          if (uploadedFileDataURL) {
            mediaData = uploadedFileDataURL;
            mediaType = 'gif';
          } else if (selectedPostType === 'gif') {
            alert('Please select a GIF file.');
            return;
          }
        }
        
        if (selectedPostType.includes('spotify') || selectedPostType === 'spotify') {
          const spotifyUrl = spotifyInput.value.trim();
          if (spotifyUrl) {
            mediaData = spotifyUrl;
            mediaType = 'spotify';
          } else if (selectedPostType === 'spotify') {
            alert('Please enter a Spotify URL.');
            return;
          }
        }
        
        if (selectedPostType === 'text' && !content) {
          alert('Please write some text.');
          return;
        }
        
        const newPost = await createPost(content, mediaData, mediaType);
        if (newPost) {
          await loadPosts();
          clearBtn.click();
        }
      }

      // ---------- LOAD POSTS ----------
      async function loadPosts() {
        await fetchPosts();
        renderPosts();
      }

      // ---------- EVENTS ----------
      createBtn.addEventListener('click', handleCreatePost);

      // Theme switching
      themeDots.forEach(dot => {
        dot.addEventListener('click', function() {
          const theme = this.dataset.theme;
          document.body.className = theme;
          themeDots.forEach(d => d.classList.remove('active'));
          this.classList.add('active');
          localStorage.setItem('selected_theme', theme);
        });
      });

      const savedTheme = localStorage.getItem('selected_theme') || 'dark';
      document.body.className = savedTheme;
      themeDots.forEach(dot => {
        if (dot.dataset.theme === savedTheme) dot.classList.add('active');
      });

      // Block context menu & devtools
      document.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
          return false;
        }
        if (e.ctrlKey && e.key === 'p') { e.preventDefault(); return false; }
      });

      // ---------- INIT ----------
      updatePostTypeUI('text');
      loadPosts();

      console.log('🚀 Secret Files App Loaded');
      console.log('👑 Click the "Admin" button to unlock admin features');
      console.log('🔑 Admin password: secret2026');
    })();
  </script>
</body>
</html>
